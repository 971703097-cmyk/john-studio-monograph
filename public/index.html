<style>
/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b0d;
  color:#fff;
}

/* =========================
   HOME / 主页面
========================= */
#homePage{
  display:block;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  transition:opacity 1.2s ease, transform 4s ease;
  filter:brightness(0.78);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  /* 让 Hero 底图在底部慢慢融入浅色页面，而不是硬切断 */
  background:
    linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.12) 22%,
      rgba(0,0,0,0.06) 42%,
      rgba(245,245,247,0.00) 56%,
      rgba(245,245,247,0.24) 70%,
      rgba(245,245,247,0.58) 82%,
      rgba(245,245,247,0.88) 92%,
      rgba(245,245,247,1.00) 100%
    );
}

.hero::before{
  content:"";
  position:absolute;
  left:-2%;
  right:-2%;
  bottom:-6%;
  height:34%;
  pointer-events:none;
  z-index:1;
  /* 再加一层柔和雾化过渡，让白底更自然地接住底图 */
  background:
    radial-gradient(
      ellipse at center bottom,
      rgba(245,245,247,0.72) 0%,
      rgba(245,245,247,0.42) 40%,
      rgba(245,245,247,0.16) 68%,
      rgba(245,245,247,0.00) 100%
    );
  filter:blur(18px);
  transform:translateY(6%);
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-size:72px;
  margin:0;
  font-weight:300;
  letter-spacing:-1px;
}

/* NAV */
.nav{
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:60px;
}

.item{
  cursor:pointer;
  opacity:0.45;
  transition:transform 0.25s ease, opacity 0.25s ease;
  text-align:center;
}

.item:hover{
  opacity:1;
  transform:scale(1.12);
}

.item.active{
  opacity:1;
}

.item span{
  display:block;
  font-size:12px;
  opacity:0.4;
}

/* SECTION */
.section{
  padding:120px 40px;
  max-width:1100px;
  margin:auto;
}

.title{
  font-size:12px;
  letter-spacing:3px;
  opacity:0.4;
  margin-bottom:40px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px;
}

.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:22px;
  transition:0.4s ease;
}

.card:hover img{
  transform:scale(1.02);
}

.card .text{
  padding:12px 6px;
}

.card .text span{
  display:block;
  font-size:12px;
  opacity:0.4;
  margin-top:6px;
}

/* CONTACT */
.contact{
  padding:120px 40px;
  max-width:1000px;
  margin:auto;
  opacity:0.75;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  font-size:13px;
}

/* =========================
   SPACE / 空间页面
========================= */
#spacePage{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:#000;
  overflow:hidden;
  color:#fff;
}

/* STAGE */
.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* SLIDES */
.slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transform:scale(1.05);
  transition:opacity 1.2s ease, transform 5s ease;
  filter:brightness(0.90);
}

.slide.active{
  opacity:1;
  transform:scale(1.12);
}

/* SMART IMAGE MODE
   横图：cover 全屏沉浸
   竖图：contain 完整显示 + 同图 cover 背景补满 */
.slide.portrait{
  background-size:contain, cover;
  background-position:center, center;
  background-repeat:no-repeat, no-repeat;
}

.slide.landscape{
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* OVERLAY */
.stage::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.02) 0%,
    rgba(0,0,0,0.03) 52%,
    rgba(0,0,0,0.12) 78%,
    rgba(0,0,0,0.42) 100%
  );
  pointer-events:none;
}

/* TOP PROJECT SWITCHER */
.topnav{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:40px;
  z-index:20;
}

.navGroup{
  position:relative;
  padding:0 0 18px;
}

.tab{
  font-size:12px;
  letter-spacing:2px;
  opacity:0.4;
  cursor:pointer;
  transition:0.25s;
}

.navGroup:hover .tab{
  opacity:0.8;
  transform:scale(1.08);
}

.navGroup.active .tab{
  opacity:1;
}

.projectMenu{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%) translateY(8px);
  min-width:190px;
  padding:10px 0;
  border-radius:0;
  background:transparent;
  backdrop-filter:none;
  border:none;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  text-align:center;
}

.navGroup:hover .projectMenu{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}

.projectOption{
  display:block;
  font-size:11px;
  letter-spacing:1.4px;
  line-height:1.45;
  padding:8px 4px;
  opacity:0.48;
  cursor:pointer;
  transition:opacity .22s ease, transform .22s ease;
  white-space:nowrap;
}

.projectOption:hover{
  opacity:1;
  transform:scale(1.04);
}

.projectOption.current{
  opacity:1;
}

.projectOption span{
  display:block;
  font-size:10px;
  letter-spacing:0;
  opacity:.35;
  margin-top:2px;
}

/* META */
.meta{
  position:absolute;
  bottom:34px;
  left:34px;
  z-index:10;
  text-shadow:0 2px 12px rgba(0,0,0,0.38);
}

.space-title{
  font-size:14px;
  opacity:0.9;
}

.desc{
  font-size:12px;
  opacity:0.45;
  margin-top:6px;
}

.project-index{
  font-size:11px;
  opacity:0.35;
  margin-top:12px;
  letter-spacing:2px;
}

/* hint */
.hint{
  position:absolute;
  right:28px;
  bottom:28px;
  font-size:11px;
  opacity:0.25;
  z-index:10;
}


/* PORTRAIT ONLY SIDE BLUR GLASS
   只在竖向图片 contain 排版时开启；横幅图片保持原样 */
.sideBlur{
  position:absolute;
  top:0;
  bottom:0;
  width:min(29vw, 430px);
  z-index:6;
  pointer-events:none;
  opacity:0;
  transition:opacity .45s ease;
  backdrop-filter:blur(11px) saturate(0.98) brightness(1.00);
  -webkit-backdrop-filter:blur(11px) saturate(0.98) brightness(1.00);
}

.stage.portraitMode .sideBlur{
  opacity:1;
}

.sideBlur.left{
  left:0;
  background:
    linear-gradient(to right,
      rgba(0,0,0,0.045) 0%,
      rgba(0,0,0,0.028) 24%,
      rgba(0,0,0,0.012) 50%,
      rgba(255,255,255,0.010) 78%,
      rgba(255,255,255,0.00) 100%);
  box-shadow:
    inset -12px 0 24px rgba(0,0,0,0.045),
    inset -1px 0 0 rgba(255,255,255,0.025);
  mask-image:linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,.95) 74%, rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,.95) 74%, rgba(0,0,0,0) 100%);
}

.sideBlur.right{
  right:0;
  background:
    linear-gradient(to left,
      rgba(0,0,0,0.045) 0%,
      rgba(0,0,0,0.028) 24%,
      rgba(0,0,0,0.012) 50%,
      rgba(255,255,255,0.010) 78%,
      rgba(255,255,255,0.00) 100%);
  box-shadow:
    inset 12px 0 24px rgba(0,0,0,0.045),
    inset 1px 0 0 rgba(255,255,255,0.025);
  mask-image:linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,.95) 74%, rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,.95) 74%, rgba(0,0,0,0) 100%);
}

@media(max-width:760px){

/* =========================
   V3 INTERACTION ONLY
   不改页面框架，只给原有首页元素加入滚动触发
========================= */

/* 首页宣言：保留原位置，只在滚动时轻微响应 */
.hero-manifesto-v2{
  will-change:transform, opacity, filter;
}

/* 项目区标题：保持原结构，只做进入时的轻微显现 */
.section .title{
  opacity:0;
  transform:translateY(26px);
  filter:blur(6px);
  transition:
    opacity .78s ease,
    transform .86s cubic-bezier(.2,.8,.2,1),
    filter .86s cubic-bezier(.2,.8,.2,1);
}

.section .title.is-visible{
  opacity:.42;
  transform:translateY(0);
  filter:blur(0);
}

/* 原有项目卡片：不改变网格，不新增模块，只让它们一张张出现 */
.cards .card{
  opacity:0;
  transform:translateY(54px) scale(.985);
  filter:blur(9px);
  transition:
    opacity .78s cubic-bezier(.2,.8,.2,1),
    transform .9s cubic-bezier(.2,.8,.2,1),
    filter .9s cubic-bezier(.2,.8,.2,1);
  will-change:transform, opacity, filter;
}

.cards .card.is-visible{
  opacity:1;
  transform:translateY(0) scale(1);
  filter:blur(0);
}

/* 让卡片根据顺序错开出现，形成“往下滑一张张跳出来”的节奏 */
.cards .card:nth-child(1).is-visible{ transition-delay:.02s; }
.cards .card:nth-child(2).is-visible{ transition-delay:.10s; }
.cards .card:nth-child(3).is-visible{ transition-delay:.18s; }
.cards .card:nth-child(4).is-visible{ transition-delay:.26s; }
.cards .card:nth-child(5).is-visible{ transition-delay:.34s; }
.cards .card:nth-child(6).is-visible{ transition-delay:.42s; }

/* 鼠标靠近作品：图片像被轻轻唤醒，但不改变框架 */
.cards .card img{
  transition:
    transform .82s cubic-bezier(.2,.8,.2,1),
    filter .82s cubic-bezier(.2,.8,.2,1),
    box-shadow .82s cubic-bezier(.2,.8,.2,1) !important;
}

.cards .card:hover img{
  transform:scale(1.035) !important;
  filter:brightness(1.035) saturate(1.02);
}

.cards .card .text{
  transition:
    opacity .36s ease,
    transform .42s cubic-bezier(.2,.8,.2,1);
}

.cards .card:hover .text{
  opacity:1;
  transform:translateY(-2px);
}

/* 点击进入空间前的轻微过渡提示，不改变 SPACE 框架 */
.cards .card.entering{
  transform:translateY(0) scale(1.018) !important;
  filter:blur(0) brightness(.98);
  transition:
    transform .34s cubic-bezier(.2,.8,.2,1),
    filter .34s cubic-bezier(.2,.8,.2,1) !important;
}

@media (prefers-reduced-motion: reduce){
  .hero-manifesto-v2,
  .section .title,
  .cards .card,
  .cards .card img,
  .cards .card .text{
    transition:none !important;
    animation:none !important;
    transform:none !important;
    filter:none !important;
  }

  .section .title,
  .cards .card{
    opacity:1 !important;
  }
}


/* =========================
   V3.1 PROJECT TEXT REVEAL
   项目标题文字也跟随滚动出现
========================= */

/* 先让项目文字在进入前隐藏 */
.cards .card .text h3,
.cards .card .text p{
  opacity:0;
  filter:blur(7px);
  transform:translateY(22px);
  will-change:opacity, transform, filter;
}

/* 图片先出现，标题后出现，中文副标题再慢半拍出现 */
.cards .card.is-visible .text h3{
  opacity:1;
  filter:blur(0);
  transform:translateY(0);
  transition:
    opacity .72s ease .22s,
    transform .82s cubic-bezier(.2,.8,.2,1) .22s,
    filter .82s cubic-bezier(.2,.8,.2,1) .22s,
    letter-spacing .46s ease,
    color .46s ease;
}

.cards .card.is-visible .text p{
  opacity:1;
  filter:blur(0);
  transform:translateY(0);
  transition:
    opacity .72s ease .36s,
    transform .82s cubic-bezier(.2,.8,.2,1) .36s,
    filter .82s cubic-bezier(.2,.8,.2,1) .36s,
    color .46s ease;
}

/* 每张卡片的文字再错开一点，让它像 Apple 那样一张张被滚动带出来 */
.cards .card:nth-child(1).is-visible .text h3{ transition-delay:.20s, .20s, .20s, 0s, 0s; }
.cards .card:nth-child(1).is-visible .text p{ transition-delay:.34s, .34s, .34s, 0s; }

.cards .card:nth-child(2).is-visible .text h3{ transition-delay:.30s, .30s, .30s, 0s, 0s; }
.cards .card:nth-child(2).is-visible .text p{ transition-delay:.44s, .44s, .44s, 0s; }

.cards .card:nth-child(3).is-visible .text h3{ transition-delay:.40s, .40s, .40s, 0s, 0s; }
.cards .card:nth-child(3).is-visible .text p{ transition-delay:.54s, .54s, .54s, 0s; }

.cards .card:nth-child(4).is-visible .text h3{ transition-delay:.50s, .50s, .50s, 0s, 0s; }
.cards .card:nth-child(4).is-visible .text p{ transition-delay:.64s, .64s, .64s, 0s; }

.cards .card:nth-child(5).is-visible .text h3{ transition-delay:.60s, .60s, .60s, 0s, 0s; }
.cards .card:nth-child(5).is-visible .text p{ transition-delay:.74s, .74s, .74s, 0s; }

.cards .card:nth-child(6).is-visible .text h3{ transition-delay:.70s, .70s, .70s, 0s, 0s; }
.cards .card:nth-child(6).is-visible .text p{ transition-delay:.84s, .84s, .84s, 0s; }

/* hover 时文字也有轻微交互，不只图片动 */
.cards .card.is-visible:hover .text h3{
  letter-spacing:-.035em;
  color:#000;
  transform:translateY(-3px) scale(1.018);
}

.cards .card.is-visible:hover .text p{
  color:rgba(29,29,31,.72);
  transform:translateY(-2px);
}

/* 点击进入时，标题有一个很短的确认反馈 */
.cards .card.entering .text h3{
  transform:translateY(-4px) scale(1.025) !important;
  color:#000 !important;
}

.cards .card.entering .text p{
  transform:translateY(-2px) !important;
  color:rgba(29,29,31,.76) !important;
}


/* =========================
   V3.2 REPLAYABLE SCROLL MOTION
   回滚 / 再下滑时，项目图片和文字可循环触发动效
========================= */

/* 防止快速滚动时出现太突兀的闪烁，让重置更柔和 */
.cards .card:not(.is-visible){
  transition-delay:0s !important;
}

.cards .card:not(.is-visible) .text h3,
.cards .card:not(.is-visible) .text p{
  transition-delay:0s !important;
}

/* 标题也跟随滚动重复出现，而不是只播放一次 */
.section .title:not(.is-visible){
  transition-delay:0s !important;
}

/* 回到首页时，宣言文字继续根据滚动位置恢复，不是一次性消失 */
.hero-manifesto-v2{
  transition:
    opacity .18s linear,
    filter .18s linear,
    transform .18s linear;
}


/* =========================
   V3.3 STRONGER PROJECT TEXT MOTION
   项目文字动效加强：更明显，但不改变页面框架
========================= */

/* 给文字区一点“被打开”的空间感 */
.cards .card .text{
  overflow:hidden;
  transform-origin:left center;
}

/* 初始状态更明确：往下、轻模糊、字距略开 */
.cards .card .text h3{
  opacity:0 !important;
  transform:translate3d(0, 42px, 0) scale(.965) !important;
  filter:blur(14px) !important;
  letter-spacing:.015em !important;
}

.cards .card .text p{
  opacity:0 !important;
  transform:translate3d(0, 34px, 0) scale(.975) !important;
  filter:blur(12px) !important;
}

/* 出现状态：标题更明显地浮上来，中文慢半拍 */
.cards .card.is-visible .text h3{
  opacity:1 !important;
  transform:translate3d(0, 0, 0) scale(1) !important;
  filter:blur(0) !important;
  letter-spacing:-.045em !important;
  transition:
    opacity .95s cubic-bezier(.2,.8,.2,1) .30s,

.cards .card:not(.is-visible) .text h3,

    opacity .28s ease,

/* =========================
   V3.4 SEPARATED IMAGE / TEXT MOTION
   解决：文字和图片一起动，所以文字动效不明显
   新逻辑：卡片框架不动；图片先出现；文字后出现
========================= */

/* 卡片本体不再整体淡入，否则文字会被图片动效吃掉 */
.cards .card{
  opacity:1 !important;
  transform:none !important;
  filter:none !important;
  transition:none !important;
}

/* 图片单独作为第一层动效 */
.cards .card img{
  opacity:0 !important;
  transform:translate3d(0, 64px, 0) scale(.965) !important;
  filter:blur(14px) brightness(.98) saturate(.96) !important;
  transition:
    opacity .78s cubic-bezier(.2,.8,.2,1),
    transform 1.02s cubic-bezier(.2,.8,.2,1),
    filter 1.02s cubic-bezier(.2,.8,.2,1),
    box-shadow .82s cubic-bezier(.2,.8,.2,1) !important;
  will-change:opacity, transform, filter;
}

.cards .card.is-visible img{
  opacity:1 !important;
  transform:translate3d(0, 0, 0) scale(1) !important;
  filter:blur(0) brightness(1) saturate(1) !important;
}

/* 文字单独作为第二层动效，明显慢于图片 */
.cards .card .text h3{
  opacity:0 !important;
  transform:translate3d(0, 72px, 0) scale(.955) !important;
  filter:blur(16px) !important;
  letter-spacing:.025em !important;
  transition:
    opacity .82s cubic-bezier(.2,.8,.2,1),
    transform 1.05s cubic-bezier(.2,.8,.2,1),
    filter 1.05s cubic-bezier(.2,.8,.2,1),
    letter-spacing 1.05s cubic-bezier(.2,.8,.2,1),
    color .42s ease !important;
  will-change:opacity, transform, filter;
}

.cards .card .text p{
  opacity:0 !important;
  transform:translate3d(0, 52px, 0) scale(.972) !important;
  filter:blur(13px) !important;
  transition:
    opacity .82s cubic-bezier(.2,.8,.2,1),
    transform 1.05s cubic-bezier(.2,.8,.2,1),
    filter 1.05s cubic-bezier(.2,.8,.2,1),
    color .42s ease !important;
  will-change:opacity, transform, filter;
}

/* 关键：图片先出来，标题等图片稳定后才出来，中文再慢半拍 */
.cards .card.is-visible .text h3{
  opacity:1 !important;
  transform:translate3d(0, 0, 0) scale(1) !important;
  filter:blur(0) !important;
  letter-spacing:-.045em !important;
  transition-delay:.74s, .74s, .74s, .74s, 0s !important;
}

.cards .card.is-visible .text p{
  opacity:1 !important;
  transform:translate3d(0, 0, 0) scale(1) !important;
  filter:blur(0) !important;
  transition-delay:.94s, .94s, .94s, 0s !important;
}

/* 不同卡片之间仍然有轻微错位，但不让文字和图片同时出现 */
.cards .card:nth-child(1).is-visible img{ transition-delay:.00s,.00s,.00s,0s !important; }
.cards .card:nth-child(1).is-visible .text h3{ transition-delay:.72s,.72s,.72s,.72s,0s !important; }
.cards .card:nth-child(1).is-visible .text p{ transition-delay:.92s,.92s,.92s,0s !important; }

.cards .card:nth-child(2).is-visible img{ transition-delay:.10s,.10s,.10s,0s !important; }
.cards .card:nth-child(2).is-visible .text h3{ transition-delay:.84s,.84s,.84s,.84s,0s !important; }
.cards .card:nth-child(2).is-visible .text p{ transition-delay:1.04s,1.04s,1.04s,0s !important; }

.cards .card:nth-child(3).is-visible img{ transition-delay:.20s,.20s,.20s,0s !important; }
.cards .card:nth-child(3).is-visible .text h3{ transition-delay:.96s,.96s,.96s,.96s,0s !important; }
.cards .card:nth-child(3).is-visible .text p{ transition-delay:1.16s,1.16s,1.16s,0s !important; }

.cards .card:nth-child(4).is-visible img{ transition-delay:.30s,.30s,.30s,0s !important; }
.cards .card:nth-child(4).is-visible .text h3{ transition-delay:1.08s,1.08s,1.08s,1.08s,0s !important; }
.cards .card:nth-child(4).is-visible .text p{ transition-delay:1.28s,1.28s,1.28s,0s !important; }

.cards .card:nth-child(5).is-visible img{ transition-delay:.40s,.40s,.40s,0s !important; }
.cards .card:nth-child(5).is-visible .text h3{ transition-delay:1.20s,1.20s,1.20s,1.20s,0s !important; }
.cards .card:nth-child(5).is-visible .text p{ transition-delay:1.40s,1.40s,1.40s,0s !important; }

.cards .card:nth-child(6).is-visible img{ transition-delay:.50s,.50s,.50s,0s !important; }
.cards .card:nth-child(6).is-visible .text h3{ transition-delay:1.32s,1.32s,1.32s,1.32s,0s !important; }
.cards .card:nth-child(6).is-visible .text p{ transition-delay:1.52s,1.52s,1.52s,0s !important; }

/* hover 只在已经出现后生效 */
.cards .card.is-visible:hover img{
  transform:translate3d(0, 0, 0) scale(1.035) !important;
  filter:blur(0) brightness(1.035) saturate(1.02) !important;
}

.cards .card.is-visible:hover .text h3{
  transform:translate3d(0, -5px, 0) scale(1.026) !important;
  letter-spacing:-.055em !important;
  color:#000 !important;
}

.cards .card.is-visible:hover .text p{
  transform:translate3d(0, -3px, 0) !important;
  color:rgba(29,29,31,.72) !important;
}

/* 离开视口重置时，不要拖延，保证回滚后再下滑可以重新播放 */
.cards .card:not(.is-visible) img,
.cards .card:not(.is-visible) .text h3,
.cards .card:not(.is-visible) .text p{
  transition-delay:0s !important;
}

/* 点击反馈保持轻微 */
.cards .card.entering img{
  transform:translate3d(0, 0, 0) scale(1.045) !important;
  filter:blur(0) brightness(.98) saturate(1.02) !important;
}

.cards .card.entering .text h3{
  transform:translate3d(0, -6px, 0) scale(1.03) !important;
}


/* =========================
   V3.5 CONTACT TEXT MOTION
   联系区文字也加入滚动触发动效，且可循环

.contact-motion{

  align-items:start;
}

.contact-motion .contact-col{
  overflow:hidden;
  min-height:58px;
}

.contact-motion .contact-line{
  display:block;
  opacity:0;
  transform:translate3d(0, 34px, 0);
  filter:blur(10px);
  will-change:opacity, transform, filter, letter-spacing;
}

.contact-motion .contact-line.primary{

  line-height:1.35;
  font-weight:400;
  letter-spacing:-.012em;

/* 进入视口：每一列错开，每一行再慢半拍 */

  opacity:1;
  transform:translate3d(0, 0, 0);
  filter:blur(0);
  transition:
    opacity .86s cubic-bezier(.2,.8,.2,1) .10s,
    transform 1.02s cubic-bezier(.2,.8,.2,1) .10s,
    filter 1.02s cubic-bezier(.2,.8,.2,1) .10s,

.contact-motion.is-visible .contact-col:nth-child(1) .secondary{
  opacity:1;
  transform:translate3d(0, 0, 0);
  filter:blur(0);
  transition:
    opacity .86s cubic-bezier(.2,.8,.2,1) .26s,
    transform 1.02s cubic-bezier(.2,.8,.2,1) .26s,
    filter 1.02s cubic-bezier(.2,.8,.2,1) .26s;
}

.contact-motion.is-visible .contact-col:nth-child(2) .primary{
  opacity:1;
  transform:translate3d(0, 0, 0);
  filter:blur(0);
  transition:
    opacity .86s cubic-bezier(.2,.8,.2,1) .28s,
    transform 1.02s cubic-bezier(.2,.8,.2,1) .28s,
    filter 1.02s cubic-bezier(.2,.8,.2,1) .28s,
    letter-spacing .72s ease .28s;
}

.contact-motion.is-visible .contact-col:nth-child(2) .secondary{
  opacity:1;
  transform:translate3d(0, 0, 0);
  filter:blur(0);
  transition:
    opacity .86s cubic-bezier(.2,.8,.2,1) .44s,
    transform 1.02s cubic-bezier(.2,.8,.2,1) .44s,
    filter 1.02s cubic-bezier(.2,.8,.2,1) .44s;
}

.contact-motion.is-visible .contact-col:nth-child(3) .primary{
  opacity:1;
  transform:translate3d(0, 0, 0);
  filter:blur(0);
  transition:
    opacity .86s cubic-bezier(.2,.8,.2,1) .46s,
    transform 1.02s cubic-bezier(.2,.8,.2,1) .46s,
    filter 1.02s cubic-bezier(.2,.8,.2,1) .46s,
    letter-spacing .72s ease .46s;
}

/* 离开视口后重置，回滚再下滑会重新播放 */
.contact-motion:not(.is-visible) .contact-line{
  transition:
    opacity .26s ease,
    transform .26s ease,
    filter .26s ease !important;
}

/* 鼠标经过联系信息：只做很轻的字体响应 */
.contact-motion .contact-col:hover .primary{
  letter-spacing:-.032em;
  color:#000;
  transition:letter-spacing .36s ease, color .36s ease;
}

.contact-motion .contact-col:hover .secondary{
  color:rgba(29,29,31,.86);
  transform:translate3d(0, -1px, 0);
  transition:color .36s ease, transform .36s ease;
}

  }
}

/* =========================================================
   V14.17 HOME HERO IMAGE TRANSITION — MATCH SPACE PAGE LOGIC
   只改首页封面底图切换方式。
   参考项目空间页 .slide / .slide.active 的做法：
   - 多张绝对定位背景图叠放
   - active 通过 opacity 切换
   - 图片缓慢 scale，形成空间页那种轻微推进感
   不改顶部导航、不改理念文字运动、不改项目区、不改卡片、不改筛选交互。
========================================================= */

/* 原 #bg 保留给旧代码和自动取色逻辑读取 backgroundImage，但视觉隐藏 */
#homePage .hero #bg{
  opacity:0 !important;
  pointer-events:none !important;
}

/* 首页专用 slide 容器，放在 hero 最底层 */
#homePage .home-hero-slides{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
  background:#000;
  pointer-events:none;
}

/* 复刻项目空间页 slide 的核心视觉机制 */
#homePage .home-hero-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center center;
  background-repeat:no-repeat;
  opacity:0;
  transform:scale(1.05);
  transition:
    opacity 1.2s ease,
    transform 5s ease;
  filter:brightness(0.92) saturate(0.97);
  will-change:opacity, transform;
}

/* active 时轻微推进，和项目空间页类似 */
#homePage .home-hero-slide.active{
  opacity:1;
  transform:scale(1.12);
}

/* 避免旧 hero overlay 抢走空间页式图片质感，只保留轻微可读性渐变 */
#homePage .hero::before{
  display:none !important;
}

#homePage .hero::after{
  content:"" !important;
  position:absolute !important;
  inset:0 !important;
  z-index:1 !important;
  pointer-events:none !important;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.02) 0%,
    rgba(0,0,0,0.03) 52%,
    rgba(0,0,0,0.12) 78%,
    rgba(0,0,0,0.34) 100%
  ) !important;
}

/* 确保首页文字和顶部导航仍在图片层上方 */
#homePage .home-hero-shell,
#homePage .content{
  position:relative;
  z-index:4;
}

function getProjectLandingY(){
  const projectsEl = document.getElementById("projects");
  if(!projectsEl) return 0;

  // 统一落点：PROJECTS / 项目 稳定落在顶部导航下方，

  const titleTargetY = window.innerWidth <= 900 ? 96 : 92;
  return Math.max(0, projectsEl.offsetTop - titleTargetY);
}

function goToProjectLanding(type="all", targetProject=null, options={}){
  applyHomeFilter(type);

  const focusCard = targetProject
    ? document.querySelector(`.card[data-project="${targetProject}"]`)
    : null;

  document.body.classList.add("project-landing");

  // 等 display/grid 布局稳定，再统一滚动。
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.scrollTo({
        top:getProjectLandingY(),
        behavior:options.instant ? "auto" : "smooth"
      });

      if(focusCard){
        setTimeout(()=>{
          focusCard.classList.add("return-focus");
          setTimeout(()=>focusCard.classList.remove("return-focus"), 1200);
        }, 420);
      }

      setTimeout(()=>document.body.classList.remove("project-landing"), 1350);
    });
  });
}

  item.addEventListener("click",(event)=>{

    const type = item.dataset.type || "all";

});

function syncProjectCoverImages(){
  const maxSpaceSlides = 4;

  document.querySelectorAll(".card[data-project]").forEach(card=>{
    const key = card.dataset.project;
    const img = card.querySelector("img");

    if(!key || !projects[key] || !img) return;

    const coverSrc = img.currentSrc || img.getAttribute("src");
    if(!coverSrc) return;

    const originalImgs = Array.isArray(projects[key].imgs) ? projects[key].imgs : [];
    const otherImgs = originalImgs.filter(src=>src !== coverSrc);

    projects[key].cover = coverSrc;
    projects[key].imgs = [coverSrc, ...otherImgs].slice(0, maxSpaceSlides);
  });
}

function getImageAverageBrightness(img){
  try{
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently:true });

    const sampleSize = 48;
    canvas.width = sampleSize;
    canvas.height = sampleSize;

    ctx.drawImage(img, 0, 0, sampleSize, sampleSize);
    const data = ctx.getImageData(0, 0, sampleSize, sampleSize).data;

    let total = 0;
    let count = 0;

    for(let i=0; i<data.length; i+=16){
      const r = data[i];
      const g = data[i+1];
      const b = data[i+2];

      // perceived luminance
      total += 0.2126*r + 0.7152*g + 0.0722*b;
      count++;
    }

    return total / count;
  }catch(err){
    return null;
  }
}

function loadProject(){
  const p = projects[currentProject];

  slides.forEach((sl,idx)=>{
    const src = p.imgs[idx];

    sl.classList.remove("portrait", "landscape");

    const probe = new Image();
    probe.crossOrigin = "anonymous";
    probe.onload = function(){
      const isPortrait = probe.naturalHeight > probe.naturalWidth;
      const brightness = getImageAverageBrightness(probe);

      if(brightness !== null){
        sl.dataset.brightness = brightness.toFixed(2);
      }else{
        delete sl.dataset.brightness;
      }

      if(isPortrait){
        sl.classList.add("portrait");
        sl.dataset.orientation = "portrait";
        sl.style.backgroundImage = `url(${src}), url(${src})`;
      }else{
        sl.classList.add("landscape");
        sl.dataset.orientation = "landscape";
        sl.style.backgroundImage = `url(${src})`;
      }

      if(sl.classList.contains("active")){
        updateStageImageMode();
      }
    };

    probe.onerror = function(){
      delete sl.dataset.brightness;
      updateStageImageMode();
    };

    probe.src = src;
  });

  document.getElementById("spaceTitle").innerText = p.title;
  document.getElementById("spaceDesc").innerText = p.desc;
  document.getElementById("projectIndex").innerText = `${projectTypes[p.type]} / ${p.cn}`;
}

function updateStageImageMode(){
  const stage = document.getElementById("spaceStage");
  const activeSlide = slides[slideIndex];
  const isPortrait = activeSlide && activeSlide.dataset.orientation === "portrait";
  stage.classList.toggle("portraitMode", isPortrait);

  const brightness = activeSlide ? Number(activeSlide.dataset.brightness) : NaN;

  stage.classList.remove("textOnDark", "textOnLight");

  if(!Number.isNaN(brightness)){
    // brightness high = light image => use dark text
    // brightness low = dark image => use light text
    stage.classList.add(brightness > 148 ? "textOnLight" : "textOnDark");
  }else{
    // safe fallback: light text with dark halo is usually more readable over unknown image
    stage.classList.add("textOnDark");
  }
}

function setSlide(n){
  slides.forEach(s=>s.classList.remove("active"));
  slides[n].classList.add("active");
  updateStageImageMode();
}

function nextSlide(){
  const p = projects[currentProject];
  slideIndex = (slideIndex + 1) % p.imgs.length;
  setSlide(slideIndex);
}

function startSpace(){
  clearInterval(spaceTimer);
  spaceTimer = setInterval(nextSlide, 3500);
}

function stopSpace(){
  clearInterval(spaceTimer);
}

function switchProject(key){
  if(!projects[key]) return;

  currentProject = key;
  slideIndex = 0;

  const matchingCard = document.querySelector(`.card[data-project="${key}"]`);
  if(matchingCard) lastCard = matchingCard;

  renderProjectSwitcher();
  loadProject();
  setSlide(0);
  startSpace();
}

/* HOME CARD -> PROJECT SPACE */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click",(e)=>{
    e.stopPropagation();

    captureHomeReturnState(card);
    lastCard = card;
    currentProject = card.dataset.project || "dongguanNewWorld";
    slideIndex = 0;

    openSpace();
  });
});

function openSpace(){
  document.getElementById("spacePage").style.display="block";
  document.body.style.overflow="hidden";

  const stage = document.getElementById("spaceStage");
  stage.classList.remove("textOnDark", "textOnLight");
  stage.classList.add("textOnDark");

  renderProjectSwitcher();
  loadProject();
  setSlide(0);
  startSpace();
}

/* SPACE WHEEL CONTROL
   滚轮只浏览当前项目内部图片，不跳到其它项目 */
document.getElementById("spaceStage").addEventListener("wheel",(e)=>{
  e.preventDefault();

  stopSpace();

  if(e.deltaY > 0){
    nextSlide();
  }else{
    const p = projects[currentProject];
    slideIndex = (slideIndex - 1 + p.imgs.length) % p.imgs.length;
    setSlide(slideIndex);
  }

  setTimeout(startSpace,120);
},{passive:false});


/* SPACE LEFT CLICK -> HOME, RETURN TO CURRENT PROJECT CARD */
document.getElementById("spacePage").addEventListener("click",(e)=>{
  if(e.target.closest(".topnav")) return;

  closeSpace();
});

function getProjectCardReturnY(projectKey){
  const card = projectKey
    ? document.querySelector(`.card[data-project="${projectKey}"]`)
    : null;

  if(!card) return getProjectLandingY();

  // LOCAL FIX: RETURN VISUAL CENTER
  // 退出项目空间时，不再让项目卡片靠顶部落位，
  // 而是让当前项目的主图片视觉中心对齐浏览器画面的视觉中心。
  // 这样从项目空间回主页时，用户刚刚看的项目会自然停在画面中央。
  const visualTarget = card.querySelector("img") || card;
  const rect = visualTarget.getBoundingClientRect();
  const documentCenterY = rect.top + window.scrollY + rect.height / 2;
  const viewportVisualCenterY = window.innerHeight / 2;

  return Math.max(0, documentCenterY - viewportVisualCenterY);
}

function getReturnFilterForCurrentProject(projectKey){
  const originalType = homeReturnState && homeReturnState.type
    ? homeReturnState.type
    : "all";

  const currentType = getProjectTypeFromKey(projectKey);

  // 如果原本从 ALL 视图进入，返回时继续保持 ALL 视图；
  // 如果原本在某个分类里进入，但空间里切到了另一个分类的项目，
  // 返回时切到当前项目所属分类，确保当前项目入口一定可见。
  return originalType === "all" ? "all" : currentType;
}

function closeSpace(){
  stopSpace();

  const returnProject = currentProject || (homeReturnState && homeReturnState.project) || null;
  const returnType = getReturnFilterForCurrentProject(returnProject);

  document.getElementById("spacePage").style.display="none";
  document.body.style.overflow="auto";

  // 退出项目空间时，以“当前正在看的项目”为准。
  // 例如：从 A 进入，但在空间页切到 C，返回主页时就回到 C 的项目入口。
  applyHomeFilter(returnType);

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const returnY = getProjectCardReturnY(returnProject);

      window.scrollTo({
        top:returnY,
        behavior:"auto"
      });

      const focusCard = document.querySelector(`.card[data-project="${returnProject}"]`);
      if(focusCard){
        focusCard.classList.add("return-focus");
        setTimeout(()=>focusCard.classList.remove("return-focus"), 1200);
      }
    });
  });
}

</script>

<script>
/* =========================
   TRUE AUTO CONTRAST FOR HOME TOPBAR
   - 首页 Hero 区：根据当前底图平均亮度自动切换
   - 项目白底区：自动切换成深色字体
   - 空间页：不影响
========================= */
(function(){
  const topbar = document.querySelector(".home-topbar");
  const hero = document.querySelector(".hero");
  const bg = document.getElementById("bg");

  if(!topbar || !hero || !bg) return;

  const brightnessCache = new Map();

  function getCurrentHeroImageUrl(){
    const raw = bg.style.backgroundImage || "";
    const match = raw.match(/url\(["']?(.*?)["']?\)/);
    return match ? match[1] : null;
  }

  function setTopbarTheme(mode){
    topbar.classList.toggle("text-light", mode === "light");
    topbar.classList.toggle("text-dark", mode === "dark");
  }

  function estimateBrightnessFromImage(src){
    return new Promise((resolve)=>{
      if(!src) return resolve(null);

      if(brightnessCache.has(src)){
        return resolve(brightnessCache.get(src));
      }

      const img = new Image();
      img.crossOrigin = "anonymous";

      img.onload = function(){
        try{
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d", { willReadFrequently:true });
          const size = 48;

          canvas.width = size;
          canvas.height = size;

          ctx.drawImage(img, 0, 0, size, size);
          const data = ctx.getImageData(0, 0, size, size).data;

          let total = 0;
          let count = 0;

          for(let i=0; i<data.length; i+=16){
            const r = data[i];
            const g = data[i+1];
            const b = data[i+2];
            total += 0.2126*r + 0.7152*g + 0.0722*b;
            count++;
          }

          const brightness = total / count;
          brightnessCache.set(src, brightness);
          resolve(brightness);
        }catch(e){
          resolve(null);
        }
      };

      img.onerror = function(){
        resolve(null);
      };

      img.src = src;
    });
  }

  let requestId = 0;

  async function updateTopbarContrast(){
    const currentRequest = ++requestId;
    const heroBottom = hero.offsetTop + hero.offsetHeight;

    // 下面项目区是浅色背景，直接深色字体
    if(window.scrollY > heroBottom - 120){
      setTopbarTheme("dark");
      return;
    }

    const src = getCurrentHeroImageUrl();
    const brightness = await estimateBrightnessFromImage(src);

    if(currentRequest !== requestId) return;

    // 数值越高说明图片越亮：亮底用深字；暗底用浅字
    if(brightness !== null){
      setTopbarTheme(brightness > 150 ? "dark" : "light");
    }else{
      // 如果图片跨域采样失败，就根据位置保底：
      // 首屏通常是图像区，用浅字；白色项目区上面已处理为深字。
      setTopbarTheme("light");
    }
  }

  window.addEventListener("scroll", updateTopbarContrast, {passive:true});
  window.addEventListener("resize", updateTopbarContrast);
  window.addEventListener("load", updateTopbarContrast);

  // 观察 hero 背景图变化，轮播换图时自动重新判断
  const observer = new MutationObserver(updateTopbarContrast);
  observer.observe(bg, { attributes:true, attributeFilter:["style"] });

  updateTopbarContrast();
})();
</script>


<script>
/* =========================
   V3 INTERACTION ONLY
   保留原页面框架：只给原有元素加滚动触发
========================= */
(function(){
  const hero = document.querySelector(".hero");
  const manifesto = document.querySelector(".hero-manifesto-v2");

  function clamp(value, min, max){
    return Math.max(min, Math.min(max, value));
  }

  function updateHeroMotion(){
    if(!hero || !manifesto) return;

    const progress = clamp(window.scrollY / Math.max(hero.offsetHeight, 1), 0, 1);

    // 非常轻，只让首页宣言有 Apple 式滚动响应，不让页面结构变化
    const y = -34 * progress;
    const opacity = 1 - progress * .36;
    const blur = progress * 3.2;

    manifesto.style.transform = `translate3d(0, ${y}px, 0)`;
    manifesto.style.opacity = opacity.toFixed(3);
    manifesto.style.filter = `blur(${blur.toFixed(2)}px)`;
  }

  const revealTargets = Array.from(document.querySelectorAll(".section .title, .cards .card"));

  const revealObserver = new IntersectionObserver((entries)=>{
    entries.forEach((entry)=>{
      if(entry.isIntersecting){
        entry.target.classList.add("is-visible");
      }else{
        // 离开视口后重置，回滚再进入时可以重新播放动效
        entry.target.classList.remove("is-visible");
      }
    });
  }, {
    threshold:.18,
    rootMargin:"-8% 0px -12% 0px"
  });

  revealTargets.forEach((item)=>revealObserver.observe(item));

  // 点击项目时，只加一个很短的触感，不改变原本进入 SPACE 的逻辑
  document.querySelectorAll(".cards .card").forEach((card)=>{
    card.addEventListener("click", ()=>{
      card.classList.add("entering");
      setTimeout(()=>card.classList.remove("entering"), 420);
    }, {capture:true});
  });

  let ticking = false;
  function onScroll(){
    if(ticking) return;
    ticking = true;

    requestAnimationFrame(()=>{
      updateHeroMotion();
      ticking = false;
    });
  }

  window.addEventListener("scroll", onScroll, {passive:true});
  window.addEventListener("resize", onScroll);
  window.addEventListener("load", onScroll);

  updateHeroMotion();
})();
</script>

<script>
/* =========================================================
   V14.10 MOTION LOGIC
   修正重点：
   不是延长固定到项目卡片上，而是：
   - 在白底过渡区停在参考位置；
   - 一旦项目卡片进入画面，理念文字就跟页面上移并消失。
========================================================= */
(function(){
  const layer = document.getElementById("kkaaSignatureMotion");
  if(!layer) return;

  const word = layer.querySelector(".kkaa-signature-word");
  const cn = layer.querySelector(".kkaa-signature-cn");
  const cards = document.querySelector("#projects .cards");

  const clamp = (v,min,max) => Math.max(min, Math.min(max, v));
  const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

  function applyImageColor(){
    word.style.setProperty("color", "rgba(255,255,255,.80)", "important");
    cn.style.setProperty("color", "rgba(255,255,255,.52)", "important");
    word.style.setProperty("text-shadow", "0 1px 2px rgba(0,0,0,.24), 0 14px 34px rgba(0,0,0,.18)", "important");
    cn.style.setProperty("text-shadow", "0 1px 2px rgba(0,0,0,.18), 0 10px 24px rgba(0,0,0,.12)", "important");
  }

  function applyPaperColor(){
    word.style.setProperty("color", "rgba(29,29,31,.50)", "important");
    cn.style.setProperty("color", "rgba(29,29,31,.30)", "important");
    word.style.setProperty("text-shadow", "none", "important");
    cn.style.setProperty("text-shadow", "none", "important");
  }

  function updateManifestoMotion(){
    const y = window.scrollY || window.pageYOffset || 0;
    const vh = window.innerHeight || 1;

    /*
      A 初始：在首页封面图偏下处。
      B 过渡：到达参考图中的固定位置。
      C 项目卡片进入：解除固定，随页面上移并消失。
    */
    const startTop = vh * 0.73;
    const holdTop = vh * 0.435;
    const arriveAtHold = vh * 0.56;

    let top = startTop;
    let opacity = 1;

    if(y <= arriveAtHold){
      const p = easeOutCubic(clamp(y / arriveAtHold, 0, 1));
      top = startTop + (holdTop - startTop) * p;
    }else{
      top = holdTop;
    }

    /*
      关键修正：
      用“项目卡片距离视口顶部的位置”来决定什么时候释放。
      当卡片顶部进入视口下方约 82% 位置时开始释放；
      当卡片继续上移到约 54% 位置时，理念文字完全消失。
    */
    if(cards){
      const cardsTop = cards.getBoundingClientRect().top;
      const releaseCardsTop = vh * 0.82;
      const goneCardsTop = vh * 0.54;

      if(cardsTop < releaseCardsTop){
        const releaseDistance = releaseCardsTop - cardsTop;
        const totalRelease = releaseCardsTop - goneCardsTop;
        const p = clamp(releaseDistance / totalRelease, 0, 1);

        top = holdTop - releaseDistance;
        opacity = 1 - p;
      }
    }

    layer.style.setProperty("top", top + "px", "important");
    layer.style.setProperty("opacity", opacity.toFixed(3), "important");
    layer.classList.toggle("is-gone", opacity <= 0.01);

    if(y >= vh * 0.48){
      applyPaperColor();
    }else{
      applyImageColor();
    }
  }

  updateManifestoMotion();
  window.addEventListener("scroll", updateManifestoMotion, { passive:true });
  window.addEventListener("resize", updateManifestoMotion);
})();
</script>


<script>
/* =========================================================
   V14.14 TOP NAV AUTO COLOR — PER-ITEM CANVAS BRIGHTNESS
   只处理顶部导航文字颜色。
   逻辑来自案例：读取图片像素亮度，亮底用深字，暗底用浅字。
   为了适配“同一条导航横跨深图/白底”的情况，这里对每个导航项
   分别采样其中心点下方的真实背景，而不是整条导航统一判断。
========================================================= */
(function(){
  const topbar = document.querySelector(".home-topbar");
  if(!topbar) return;

  const imageCache = new Map();
  const brightnessCache = new Map();

  const mainTargets = Array.from(document.querySelectorAll(
    ".home-topbar-brand, .home-topbar-nav .item"
  ));

  function clamp(value, min, max){
    return Math.max(min, Math.min(max, value));
  }

  function parseRgb(color){
    if(!color || color === "transparent") return null;
    const match = color.match(/rgba?\(([^)]+)\)/i);
    if(!match) return null;
    const parts = match[1].split(",").map(v=>parseFloat(v.trim()));
    if(parts.length < 3) return null;
    const alpha = parts.length >= 4 ? parts[3] : 1;
    if(alpha <= 0.05) return null;
    return { r:parts[0], g:parts[1], b:parts[2], a:alpha };
  }

  function brightnessFromRgb(rgb){
    return 0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b;
  }

  function getUrlFromBackgroundImage(value){
    if(!value || value === "none") return null;
    const match = value.match(/url\(["']?(.*?)["']?\)/);
    return match ? match[1] : null;
  }

  function loadImage(src){
    if(!src) return Promise.resolve(null);
    if(imageCache.has(src)) return imageCache.get(src);

    const promise = new Promise(resolve=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });

    imageCache.set(src, promise);
    return promise;
  }

  async function sampleImageBrightness(src, sx, sy){
    const key = `${src}|${Math.round(sx)}|${Math.round(sy)}`;
    if(brightnessCache.has(key)) return brightnessCache.get(key);

    const img = await loadImage(src);
    if(!img) return null;

    try{
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently:true });
      canvas.width = 1;
      canvas.height = 1;

      const x = clamp(Math.round(sx), 0, img.naturalWidth - 1);
      const y = clamp(Math.round(sy), 0, img.naturalHeight - 1);

      ctx.drawImage(img, x, y, 1, 1, 0, 0, 1, 1);
      const data = ctx.getImageData(0, 0, 1, 1).data;
      const brightness = 0.2126 * data[0] + 0.7152 * data[1] + 0.0722 * data[2];

      brightnessCache.set(key, brightness);
      return brightness;
    }catch(err){
      return null;
    }
  }

  function getObjectFitImagePoint(imgEl, viewportX, viewportY){
    const rect = imgEl.getBoundingClientRect();
    const style = getComputedStyle(imgEl);
    const fit = style.objectFit || "fill";

    const localX = viewportX - rect.left;
    const localY = viewportY - rect.top;

    const nw = imgEl.naturalWidth || 1;
    const nh = imgEl.naturalHeight || 1;

    let drawnW = rect.width;
    let drawnH = rect.height;
    let offsetX = 0;
    let offsetY = 0;

    if(fit === "cover" || fit === "contain"){
      const scale = fit === "cover"
        ? Math.max(rect.width / nw, rect.height / nh)
        : Math.min(rect.width / nw, rect.height / nh);

      drawnW = nw * scale;
      drawnH = nh * scale;
      offsetX = (rect.width - drawnW) / 2;
      offsetY = (rect.height - drawnH) / 2;
    }

    const sx = ((localX - offsetX) / drawnW) * nw;
    const sy = ((localY - offsetY) / drawnH) * nh;

    return { sx, sy };
  }

  function getBackgroundImagePoint(el, viewportX, viewportY, img){
    const rect = el.getBoundingClientRect();
    const style = getComputedStyle(el);

    const localX = viewportX - rect.left;
    const localY = viewportY - rect.top;

    const nw = img.naturalWidth || 1;
    const nh = img.naturalHeight || 1;

    /*
      当前网站的 hero 与卡片图主要是 cover/center。
      这里严格按 cover/center 计算，和案例 canvas 亮度逻辑一致。
    */
    const scale = Math.max(rect.width / nw, rect.height / nh);
    const drawnW = nw * scale;
    const drawnH = nh * scale;
    const offsetX = (rect.width - drawnW) / 2;
    const offsetY = (rect.height - drawnH) / 2;

    const sx = ((localX - offsetX) / drawnW) * nw;
    const sy = ((localY - offsetY) / drawnH) * nh;

    return { sx, sy };
  }

  async function brightnessUnderPoint(x, y){
    const oldVisibility = topbar.style.visibility;
    topbar.style.visibility = "hidden";

    let el = document.elementFromPoint(x, y);

    topbar.style.visibility = oldVisibility;

    if(!el) return 255;

    let node = el;

    while(node && node !== document.documentElement){
      if(node.tagName === "IMG" && node.currentSrc){
        const pt = getObjectFitImagePoint(node, x, y);
        const b = await sampleImageBrightness(node.currentSrc, pt.sx, pt.sy);
        if(b !== null) return b;
      }

      const style = getComputedStyle(node);
      const bgUrl = getUrlFromBackgroundImage(style.backgroundImage);

      if(bgUrl){
        const img = await loadImage(bgUrl);
        if(img){
          const pt = getBackgroundImagePoint(node, x, y, img);
          const b = await sampleImageBrightness(bgUrl, pt.sx, pt.sy);
          if(b !== null) return b;
        }
      }

      const rgb = parseRgb(style.backgroundColor);
      if(rgb){
        return brightnessFromRgb(rgb);
      }

      node = node.parentElement;
    }

    const bodyBg = parseRgb(getComputedStyle(document.body).backgroundColor);
    return bodyBg ? brightnessFromRgb(bodyBg) : 255;
  }

  function applyReadableColor(target, brightness){
    const isLightBackground = brightness > 156;

    const mainColor = isLightBackground
      ? "rgba(29,29,31,.82)"
      : "rgba(255,255,255,.92)";

    const subColor = isLightBackground
      ? "rgba(29,29,31,.52)"
      : "rgba(255,255,255,.66)";

    const lineColor = isLightBackground
      ? "rgba(29,29,31,.74)"
      : "rgba(255,255,255,.88)";

    const shadow = isLightBackground
      ? "none"
      : "0 1px 2px rgba(0,0,0,.30), 0 8px 18px rgba(0,0,0,.18)";

    target.style.setProperty("color", mainColor, "important");
    target.style.setProperty("text-shadow", shadow, "important");
    target.style.setProperty("--auto-nav-line", lineColor);

    const spans = target.querySelectorAll("span, .brand-zh");
    spans.forEach(span=>{
      span.style.setProperty("color", subColor, "important");
      span.style.setProperty("text-shadow", shadow, "important");
    });

    const brandEn = target.querySelector(".brand-en");
    if(brandEn){
      brandEn.style.setProperty("color", mainColor, "important");
      brandEn.style.setProperty("text-shadow", shadow, "important");
    }
  }

  let ticking = false;
  let updateSerial = 0;

  function scheduleUpdate(){
    if(ticking) return;
    ticking = true;

    requestAnimationFrame(async ()=>{
      ticking = false;
      const serial = ++updateSerial;

      const samples = mainTargets.map(target=>{
        const rect = target.getBoundingClientRect();
        return {
          target,
          x: rect.left + rect.width / 2,
          y: rect.top + Math.min(rect.height / 2, 18)
        };
      });

      for(const sample of samples){
        const brightness = await brightnessUnderPoint(sample.x, sample.y);
        if(serial !== updateSerial) return;
        applyReadableColor(sample.target, brightness);
      }
    });
  }

  window.addEventListener("scroll", scheduleUpdate, { passive:true });
  window.addEventListener("resize", scheduleUpdate);
  window.addEventListener("load", scheduleUpdate);
  document.addEventListener("DOMContentLoaded", scheduleUpdate);

  const bg = document.getElementById("bg");
  if(bg){
    const observer = new MutationObserver(scheduleUpdate);
    observer.observe(bg, { attributes:true, attributeFilter:["style"] });
  }

  scheduleUpdate();
})();
</script>


<script>
/* =========================================================
   V14.15 MANIFESTO AUTO COLOR — CASE METHOD
   复刻案例 HTML 的思路：canvas 采样背景亮度，然后自动切换文字深浅。
   作用范围只限 #kkaaSignatureMotion，不影响顶部导航和其它元素。
========================================================= */
(function(){
  const manifesto = document.getElementById("kkaaSignatureMotion");
  if(!manifesto) return;

  const word = manifesto.querySelector(".kkaa-signature-word");
  const cn = manifesto.querySelector(".kkaa-signature-cn");
  if(!word || !cn) return;

  const imageCache = new Map();
  const brightnessCache = new Map();

  function clamp(value, min, max){
    return Math.max(min, Math.min(max, value));
  }

  function parseRgb(color){
    if(!color || color === "transparent") return null;
    const match = color.match(/rgba?\(([^)]+)\)/i);
    if(!match) return null;

    const parts = match[1].split(",").map(v=>parseFloat(v.trim()));
    if(parts.length < 3) return null;

    const alpha = parts.length >= 4 ? parts[3] : 1;
    if(alpha <= 0.05) return null;

    return { r:parts[0], g:parts[1], b:parts[2], a:alpha };
  }

  function brightnessFromRgb(rgb){
    return 0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b;
  }

  function getUrlFromBackgroundImage(value){
    if(!value || value === "none") return null;
    const match = value.match(/url\(["']?(.*?)["']?\)/);
    return match ? match[1] : null;
  }

  function loadImage(src){
    if(!src) return Promise.resolve(null);
    if(imageCache.has(src)) return imageCache.get(src);

    const promise = new Promise(resolve=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });

    imageCache.set(src, promise);
    return promise;
  }

  async function sampleImageBrightness(src, sx, sy){
    const key = `${src}|${Math.round(sx)}|${Math.round(sy)}`;
    if(brightnessCache.has(key)) return brightnessCache.get(key);

    const img = await loadImage(src);
    if(!img) return null;

    try{
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently:true });
      canvas.width = 1;
      canvas.height = 1;

      const x = clamp(Math.round(sx), 0, img.naturalWidth - 1);
      const y = clamp(Math.round(sy), 0, img.naturalHeight - 1);

      ctx.drawImage(img, x, y, 1, 1, 0, 0, 1, 1);
      const data = ctx.getImageData(0, 0, 1, 1).data;
      const brightness = 0.2126 * data[0] + 0.7152 * data[1] + 0.0722 * data[2];

      brightnessCache.set(key, brightness);
      return brightness;
    }catch(err){
      return null;
    }
  }

  function getObjectFitImagePoint(imgEl, viewportX, viewportY){
    const rect = imgEl.getBoundingClientRect();
    const style = getComputedStyle(imgEl);
    const fit = style.objectFit || "fill";

    const localX = viewportX - rect.left;
    const localY = viewportY - rect.top;

    const nw = imgEl.naturalWidth || 1;
    const nh = imgEl.naturalHeight || 1;

    let drawnW = rect.width;
    let drawnH = rect.height;
    let offsetX = 0;
    let offsetY = 0;

    if(fit === "cover" || fit === "contain"){
      const scale = fit === "cover"
        ? Math.max(rect.width / nw, rect.height / nh)
        : Math.min(rect.width / nw, rect.height / nh);

      drawnW = nw * scale;
      drawnH = nh * scale;
      offsetX = (rect.width - drawnW) / 2;
      offsetY = (rect.height - drawnH) / 2;
    }

    return {
      sx: ((localX - offsetX) / drawnW) * nw,
      sy: ((localY - offsetY) / drawnH) * nh
    };
  }

  function getBackgroundImagePoint(el, viewportX, viewportY, img){
    const rect = el.getBoundingClientRect();

    const localX = viewportX - rect.left;
    const localY = viewportY - rect.top;

    const nw = img.naturalWidth || 1;
    const nh = img.naturalHeight || 1;

    // 当前网页中的背景图主要使用 cover / center。
    const scale = Math.max(rect.width / nw, rect.height / nh);
    const drawnW = nw * scale;
    const drawnH = nh * scale;
    const offsetX = (rect.width - drawnW) / 2;
    const offsetY = (rect.height - drawnH) / 2;

    return {
      sx: ((localX - offsetX) / drawnW) * nw,
      sy: ((localY - offsetY) / drawnH) * nh
    };
  }

  async function brightnessUnderPoint(x, y){
    const oldVisibility = manifesto.style.visibility;
    manifesto.style.visibility = "hidden";

    const el = document.elementFromPoint(x, y);

    manifesto.style.visibility = oldVisibility;

    if(!el) return 255;

    let node = el;

    while(node && node !== document.documentElement){
      if(node.tagName === "IMG" && node.currentSrc){
        const pt = getObjectFitImagePoint(node, x, y);
        const b = await sampleImageBrightness(node.currentSrc, pt.sx, pt.sy);
        if(b !== null) return b;
      }

      const style = getComputedStyle(node);
      const bgUrl = getUrlFromBackgroundImage(style.backgroundImage);

      if(bgUrl){
        const img = await loadImage(bgUrl);
        if(img){
          const pt = getBackgroundImagePoint(node, x, y, img);
          const b = await sampleImageBrightness(bgUrl, pt.sx, pt.sy);
          if(b !== null) return b;
        }
      }

      const rgb = parseRgb(style.backgroundColor);
      if(rgb){
        return brightnessFromRgb(rgb);
      }

      node = node.parentElement;
    }

    const bodyBg = parseRgb(getComputedStyle(document.body).backgroundColor);
    return bodyBg ? brightnessFromRgb(bodyBg) : 255;
  }

  async function averageBrightnessBehindManifesto(){
    const rect = manifesto.getBoundingClientRect();

    if(rect.bottom < 0 || rect.top > window.innerHeight){
      return null;
    }

    /*
      采样理念文字背后的多个点：
      左 / 中 / 右 + 中文行位置。
      这样比只取中心点稳定，不会因为某一个点刚好压在图片边缘而误判。
    */
    const points = [
      [rect.left + rect.width * 0.28, rect.top + rect.height * 0.36],
      [rect.left + rect.width * 0.50, rect.top + rect.height * 0.36],
      [rect.left + rect.width * 0.72, rect.top + rect.height * 0.36],
      [rect.left + rect.width * 0.50, rect.top + rect.height * 0.72]
    ];

    const values = [];
    for(const [x, y] of points){
      const b = await brightnessUnderPoint(x, y);
      if(typeof b === "number" && !Number.isNaN(b)){
        values.push(b);
      }
    }

    if(!values.length) return null;
    return values.reduce((a,b)=>a+b,0) / values.length;
  }

  function applyManifestoColor(brightness){
    const isLightBackground = brightness > 156;

    const wordColor = isLightBackground
      ? "rgba(29,29,31,.50)"
      : "rgba(255,255,255,.82)";

    const cnColor = isLightBackground
      ? "rgba(29,29,31,.30)"
      : "rgba(255,255,255,.54)";

    const shadow = isLightBackground
      ? "none"
      : "0 1px 2px rgba(0,0,0,.24), 0 14px 34px rgba(0,0,0,.18)";

    word.style.setProperty("color", wordColor, "important");
    word.style.setProperty("text-shadow", shadow, "important");

    cn.style.setProperty("color", cnColor, "important");
    cn.style.setProperty("text-shadow", shadow, "important");
  }

  let ticking = false;
  let serial = 0;

  function scheduleManifestoColorUpdate(){
    if(ticking) return;
    ticking = true;

    requestAnimationFrame(async ()=>{
      ticking = false;
      const current = ++serial;

      const brightness = await averageBrightnessBehindManifesto();
      if(current !== serial || brightness === null) return;

      applyManifestoColor(brightness);
    });
  }

  window.addEventListener("scroll", scheduleManifestoColorUpdate, { passive:true });
  window.addEventListener("resize", scheduleManifestoColorUpdate);
  window.addEventListener("load", scheduleManifestoColorUpdate);
  document.addEventListener("DOMContentLoaded", scheduleManifestoColorUpdate);

  const bg = document.getElementById("bg");
  if(bg){
    const observer = new MutationObserver(scheduleManifestoColorUpdate);
    observer.observe(bg, { attributes:true, attributeFilter:["style"] });
  }

  scheduleManifestoColorUpdate();
})();
</script>


<script>
/* =========================================================
   V14.17 HOME HERO SLIDES — SPACE PAGE STYLE
   用和项目空间页相同的 active slide 思路重做首页封面切换。
   不再做额外电影暗角、不做复杂双层呼吸，只保留空间页式：
   opacity fade + slow scale.
========================================================= */
(function(){
  const hero = document.querySelector("#homePage .hero");
  const bg = document.getElementById("bg");
  if(!hero || !bg) return;

  const images = Array.isArray(window.heroImages) && window.heroImages.length
    ? window.heroImages.slice()
    : [
      "assets/projects/dongguan-new-world-interior/card.webp",
      "assets/projects/nanjing-huaihe-wharf/card.webp",
      "assets/projects/bar-interior/card.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/card.webp"
    ];

  const slideWrap = document.createElement("div");
  slideWrap.className = "home-hero-slides";

  const slides = images.map((src, index)=>{
    const slide = document.createElement("div");
    slide.className = "home-hero-slide";
    if(index === 0) slide.classList.add("active");
    slide.style.backgroundImage = `url("${src}")`;
    slideWrap.appendChild(slide);
    return slide;
  });

  hero.insertBefore(slideWrap, hero.firstChild);

  let index = 0;

  /*
    保留 #bg 的 backgroundImage 同步更新：
    顶部导航/理念文字自动取色系统仍然可以读取当前图片。
  */
  bg.style.backgroundImage = `url("${images[0]}")`;
  bg.style.opacity = "0";

  function activateSlide(nextIndex){
    slides[index].classList.remove("active");
    slides[nextIndex].classList.add("active");

    index = nextIndex;
    bg.style.backgroundImage = `url("${images[index]}")`;

    /* 主动刷新自动取色系统 */
    window.dispatchEvent(new Event("scroll"));
  }

  /*
    项目空间页本来是沉浸浏览，这里首页也放慢一点：
    每张图停留 5.8s，切换动画由 CSS 1.2s opacity + 5s scale 完成。
  */
  setInterval(()=>{
    const next = (index + 1) % slides.length;
    activateSlide(next);
  }, 5800);
})();
</script>


<script>
/* =========================================================
   V15.7 SOLID AUTO-COLOR ENGINE
   要点：
   1. 继续根据背后背景深浅自动变色；
   2. 不再用 rgba 半透明，只用 hex 实色；
   3. 暗背景用浅色字，亮背景用深色字；
   4. 不改位置 / 大小 / 排版 / 动效 / 项目区 / 空间页。
========================================================= */
(function(){
  const DARK_MAIN = "#3f4146";
  const DARK_SUB = "#5f6368";
  const LIGHT_MAIN = "#f5f5f0";
  const LIGHT_SUB = "#d8d8d2";
  const THRESHOLD = 142;

  const imageCache = new Map();
  const pixelCache = new Map();

  function clamp(value, min, max){
    return Math.max(min, Math.min(max, value));
  }

  function parseRgb(color){
    if(!color || color === "transparent") return null;
    const m = color.match(/rgba?\(([^)]+)\)/i);
    if(!m) return null;
    const parts = m[1].split(",").map(v=>parseFloat(v.trim()));
    if(parts.length < 3) return null;
    const a = parts.length >= 4 ? parts[3] : 1;
    if(a <= 0.05) return null;
    return {r:parts[0], g:parts[1], b:parts[2], a};
  }

  function luminance(rgb){
    return 0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b;
  }

  function bgUrl(value){
    if(!value || value === "none") return null;
    const m = value.match(/url\(["']?(.*?)["']?\)/);
    return m ? m[1] : null;
  }

  function loadImage(src){
    if(!src) return Promise.resolve(null);
    if(imageCache.has(src)) return imageCache.get(src);

    const promise = new Promise(resolve=>{
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = ()=>resolve(img);
      img.onerror = ()=>resolve(null);
      img.src = src;
    });

    imageCache.set(src, promise);
    return promise;
  }

  async function samplePixel(src, sx, sy){
    const img = await loadImage(src);
    if(!img) return null;

    const x = clamp(Math.round(sx), 0, img.naturalWidth - 1);
    const y = clamp(Math.round(sy), 0, img.naturalHeight - 1);
    const key = `${src}|${x}|${y}`;

    if(pixelCache.has(key)) return pixelCache.get(key);

    try{
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d", {willReadFrequently:true});
      canvas.width = 1;
      canvas.height = 1;
      ctx.drawImage(img, x, y, 1, 1, 0, 0, 1, 1);
      const d = ctx.getImageData(0,0,1,1).data;
      const b = 0.2126*d[0] + 0.7152*d[1] + 0.0722*d[2];
      pixelCache.set(key, b);
      return b;
    }catch(err){
      return null;
    }
  }

  function imagePointForCover(el, x, y, img){
    const rect = el.getBoundingClientRect();
    const localX = x - rect.left;
    const localY = y - rect.top;

    const nw = img.naturalWidth || 1;
    const nh = img.naturalHeight || 1;
    const scale = Math.max(rect.width / nw, rect.height / nh);
    const drawnW = nw * scale;
    const drawnH = nh * scale;
    const offsetX = (rect.width - drawnW) / 2;
    const offsetY = (rect.height - drawnH) / 2;

    return {
      sx: ((localX - offsetX) / drawnW) * nw,
      sy: ((localY - offsetY) / drawnH) * nh
    };
  }

  function imagePointForImg(imgEl, x, y){
    const rect = imgEl.getBoundingClientRect();
    const style = getComputedStyle(imgEl);
    const fit = style.objectFit || "fill";

    const localX = x - rect.left;
    const localY = y - rect.top;
    const nw = imgEl.naturalWidth || 1;
    const nh = imgEl.naturalHeight || 1;

    let drawnW = rect.width;
    let drawnH = rect.height;
    let offsetX = 0;
    let offsetY = 0;

    if(fit === "cover" || fit === "contain"){
      const scale = fit === "cover"
        ? Math.max(rect.width / nw, rect.height / nh)
        : Math.min(rect.width / nw, rect.height / nh);

      drawnW = nw * scale;
      drawnH = nh * scale;
      offsetX = (rect.width - drawnW) / 2;
      offsetY = (rect.height - drawnH) / 2;
    }

    return {
      sx: ((localX - offsetX) / drawnW) * nw,
      sy: ((localY - offsetY) / drawnH) * nh
    };
  }

  async function brightnessAtPoint(x, y, hiddenElements){
    const old = hiddenElements.map(el=>[el, el.style.visibility]);
    hiddenElements.forEach(el=>{ if(el) el.style.visibility = "hidden"; });

    let el = document.elementFromPoint(x, y);

    old.forEach(([el, visibility])=>{ if(el) el.style.visibility = visibility; });

    if(!el) return 255;

    let node = el;
    while(node && node !== document.documentElement){
      if(node.tagName === "IMG" && node.currentSrc){
        const p = imagePointForImg(node, x, y);
        const b = await samplePixel(node.currentSrc, p.sx, p.sy);
        if(b !== null) return b;
      }

      const style = getComputedStyle(node);
      const url = bgUrl(style.backgroundImage);
      if(url){
        const img = await loadImage(url);
        if(img){
          const p = imagePointForCover(node, x, y, img);
          const b = await samplePixel(url, p.sx, p.sy);
          if(b !== null) return b;
        }
      }

      const rgb = parseRgb(style.backgroundColor);
      if(rgb) return luminance(rgb);

      node = node.parentElement;
    }

    const bodyRgb = parseRgb(getComputedStyle(document.body).backgroundColor);
    return bodyRgb ? luminance(bodyRgb) : 255;
  }

  function setColor(el, color){
    if(!el) return;
    el.style.setProperty("color", color, "important");
    el.style.setProperty("-webkit-text-fill-color", color, "important");
    el.style.setProperty("opacity", "1", "important");
    el.style.setProperty("text-shadow", "none", "important");
    el.style.setProperty("filter", "none", "important");
    el.style.setProperty("mix-blend-mode", "normal", "important");
  }

  function applyPair(mainEl, subEls, brightness){
    const isLightBackground = brightness > THRESHOLD;
    const main = isLightBackground ? DARK_MAIN : LIGHT_MAIN;
    const sub = isLightBackground ? DARK_SUB : LIGHT_SUB;

    setColor(mainEl, main);
    subEls.forEach(el=>setColor(el, sub));
  }

  async function updateTopbar(){
    const topbar = document.querySelector(".home-topbar");
    if(!topbar) return;

    const groups = [
      {
        main: document.querySelector(".home-topbar .home-topbar-brand"),
        subs: Array.from(document.querySelectorAll(".home-topbar .home-topbar-brand .brand-zh, .home-topbar .home-topbar-brand span:not(.brand-en)"))
      },
      ...Array.from(document.querySelectorAll(".home-topbar .home-topbar-nav .item")).map(item=>({
        main:item,
        subs:Array.from(item.querySelectorAll("span"))
      }))
    ].filter(g=>g.main);

    for(const group of groups){
      const rect = group.main.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + Math.min(rect.height / 2, 18);
      const b = await brightnessAtPoint(x, y, [topbar]);
      applyPair(group.main, group.subs, b);
    }

    topbar.style.setProperty("--auto-nav-line", DARK_MAIN);
  }

  async function updateManifesto(){
    const manifesto = document.getElementById("kkaaSignatureMotion");
    if(!manifesto) return;

    const word = manifesto.querySelector(".kkaa-signature-word");
    const cn = manifesto.querySelector(".kkaa-signature-cn");
    if(!word || !cn) return;

    const rect = manifesto.getBoundingClientRect();
    if(rect.bottom < 0 || rect.top > window.innerHeight) return;

    const points = [
      [rect.left + rect.width * .25, rect.top + rect.height * .38],
      [rect.left + rect.width * .50, rect.top + rect.height * .38],
      [rect.left + rect.width * .75, rect.top + rect.height * .38],
      [rect.left + rect.width * .50, rect.top + rect.height * .72]
    ];

    const values = [];
    for(const [x,y] of points){
      values.push(await brightnessAtPoint(x, y, [manifesto]));
    }

    const b = values.reduce((a,c)=>a+c,0) / values.length;
    applyPair(word, [cn], b);
  }

  function updateProjectsTitle(){
    document.querySelectorAll("#homePage .section .title").forEach(title=>{
      /* LOCAL PATCH: PROJECTS / 项目继续加深，接近项目入口文字层级 */
      setColor(title, "rgba(0,0,0,.72)");
    });
  }

  let raf = null;
  let running = false;

  function schedule(){
    if(raf) return;
    raf = requestAnimationFrame(async ()=>{
      raf = null;
      if(running) return;
      running = true;
      await updateTopbar();
      await updateManifesto();
      updateProjectsTitle();
      running = false;
    });
  }

  schedule();

  window.addEventListener("scroll", schedule, {passive:true});
  window.addEventListener("resize", schedule);
  window.addEventListener("load", schedule);
  document.addEventListener("DOMContentLoaded", schedule);

  const bg = document.getElementById("bg");
  if(bg){
    const observer = new MutationObserver(schedule);
    observer.observe(bg, {attributes:true, attributeFilter:["style"]});
  }

  /*
    原文件有轮播和旧自动取色脚本。
    这里用低频刷新兜底，但仍然是根据背景实时判断，不是固定死颜色。
  */
  setInterval(schedule, 500);
})();
</script>


<script>
/* =========================================================
   V15.8 PROJECT LANDING POSITION FIX
   只修正：从项目空间页返回主页 / 点击分类时，PROJECTS 区域落点太偏下的问题。
   不改：项目区排版、图片、颜色、顶部导航、理念文字、筛选逻辑、空间页显示。
========================================================= */
(function(){
  function absoluteTop(el){
    const rect = el.getBoundingClientRect();
    return rect.top + window.scrollY;
  }

  /*
    原逻辑用 #projects 的 section 顶部来计算。
    现在 V15 项目区上方留白更大，所以返回时会停得太早，
    导致 PROJECTS 和第一排卡片整体偏下。

    新逻辑改为以 PROJECTS / 项目 这行标题作为锚点：
    让它稳定落在顶部导航下方的视觉位置。
  */
  window.getProjectLandingY = function(){
    const projectsEl = document.getElementById("projects");
    if(!projectsEl) return 0;

    const title = projectsEl.querySelector(".title");

    // 第一张截图想要的效果：PROJECTS 在顶部导航下方，不要落到屏幕中部。
    const titleTargetY = window.innerWidth <= 900 ? 112 : 138;

    if(title){
      return Math.max(0, absoluteTop(title) - titleTargetY);
    }

    return Math.max(0, projectsEl.offsetTop - titleTargetY);
  };
})();
</script>
