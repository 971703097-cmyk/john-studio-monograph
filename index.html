<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOHN STUDIO</title>

<style>
/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b0d;
  color:#fff;
}

/* =========================
   HOME / 主页面
========================= */
#homePage{
  display:block;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  transition:opacity 1.2s ease, transform 4s ease;
  filter:brightness(0.96);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.08) 0%,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0) 72%,
    rgba(0,0,0,0.18) 90%,
    rgba(11,11,13,0.52) 100%
  );
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-size:72px;
  margin:0;
  font-weight:300;
  letter-spacing:-1px;
}

/* NAV */
.nav{
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:60px;
}

.item{
  cursor:pointer;
  opacity:0.45;
  transition:transform 0.25s ease, opacity 0.25s ease;
  text-align:center;
}

.item:hover{
  opacity:1;
  transform:scale(1.12);
}

.item.active{
  opacity:1;
}

.item span{
  display:block;
  font-size:12px;
  opacity:0.4;
}

/* SECTION */
.section{
  padding:120px 40px;
  max-width:1100px;
  margin:auto;
}

.title{
  font-size:12px;
  letter-spacing:3px;
  opacity:0.4;
  margin-bottom:40px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px;
}

.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:22px;
  transition:0.4s ease;
}

.card:hover img{
  transform:scale(1.02);
}

.card .text{
  padding:12px 6px;
}

.card .text span{
  display:block;
  font-size:12px;
  opacity:0.4;
  margin-top:6px;
}

/* CONTACT */
.contact{
  padding:120px 40px;
  max-width:1000px;
  margin:auto;
  opacity:0.75;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  font-size:13px;
}

/* =========================
   SPACE / 空间页面
========================= */
#spacePage{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:#000;
  overflow:hidden;
  color:#fff;
}

/* STAGE */
.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* SLIDES */
.slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transform:scale(1.05);
  transition:opacity 1.2s ease, transform 5s ease;
  filter:brightness(0.55);
}

.slide.active{
  opacity:1;
  transform:scale(1.12);
}

.slide.portrait{
  background-size:contain, cover;
  background-position:center, center;
  background-repeat:no-repeat, no-repeat;
}

.slide.landscape{
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* OVERLAY */
.stage::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.10),
    rgba(0,0,0,0.35),
    rgba(0,0,0,0.70),
    rgba(0,0,0,1)
  );
  pointer-events:none;
}

/* TOP NAV */
.topnav{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:40px;
  z-index:20;
}

.navGroup{
  position:relative;
  padding:0 0 18px;
}

.tab{
  font-size:12px;
  letter-spacing:2px;
  opacity:0.4;
  cursor:pointer;
  transition:0.25s;
}

.navGroup:hover .tab{
  opacity:0.8;
  transform:scale(1.1);
}

.navGroup.active .tab{
  opacity:1;
}

.projectMenu{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%) translateY(8px);
  min-width:220px;
  padding:10px 0;
  background:transparent;
  border:none;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  text-align:center;
}

.navGroup:hover .projectMenu{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}

.projectOption{
  display:block;
  font-size:11px;
  letter-spacing:1.2px;
  line-height:1.45;
  padding:8px 4px;
  opacity:0.48;
  cursor:pointer;
  transition:opacity .22s ease, transform .22s ease;
  white-space:nowrap;
}

.projectOption:hover{
  opacity:1;
  transform:scale(1.04);
}

.projectOption.current{
  opacity:1;
}

.projectOption span{
  display:block;
  font-size:10px;
  letter-spacing:0;
  opacity:.38;
  margin-top:2px;
}

/* META */
.meta{
  position:absolute;
  bottom:34px;
  left:34px;
  z-index:10;
}

.space-title{
  font-size:14px;
  opacity:0.9;
}

.desc{
  font-size:12px;
  opacity:0.45;
  margin-top:6px;
}

.project-index{
  font-size:11px;
  opacity:0.35;
  margin-top:12px;
  letter-spacing:2px;
}

/* VIEW LINK */
.view-link{
  display:inline-block;
  margin-top:14px;
  font-size:11px;
  letter-spacing:2px;
  opacity:0.6;
  color:#fff;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  padding-bottom:2px;
  transition:0.25s;
}
.view-link:hover{
  opacity:1;
  border-bottom-color:rgba(255,255,255,0.8);
}

/* hint */
.hint{
  position:absolute;
  right:28px;
  bottom:28px;
  font-size:11px;
  opacity:0.25;
  z-index:10;
}
</style>
</head>

<body>

<!-- =========================
     HOME / 主页面
========================= -->
<div id="homePage">

    <div class="bg" id="bg"></div>

    <div class="content">

      <div class="nav">
        <div class="item active" data-type="all">ALL<span>全部</span></div>

    </div>
  </div>

  <!-- CONTACT -->
  <div class="contact">
    <div>JOHN STUDIO<br>Studio</div>
    <div>971703097@qq.com<br>Instagram</div>
    <div>Guangzhou, China<br>中国 · 广州</div>
  </div>

</div>

<!-- =========================
     SPACE / 空间页面
========================= -->
<div id="spacePage">

  <div class="stage" id="spaceStage">

    <!-- TOP NAV -->
    <div class="topnav" id="topnavContainer">
      <!-- Tabs generated by JS -->
    </div>

    <!-- SLIDES (generated dynamically) -->
    <div id="slidesContainer"></div>

    <div class="meta">

    desc: "A calm interior sequence shaped by material restraint, light, and spatial rhythm.",

    card: "assets/projects/guangzhou-nansha-yitao-peninsula/card.webp",

      "assets/projects/guangzhou-nansha-yitao-peninsula/03.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/04.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/05.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/06.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/07.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/08.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/09.webp"
    ]
  }
];

/* =========================
   GENERATE HOME CARDS
========================= */
const cardsContainer = document.getElementById("cardsContainer");

projects.forEach((p, i) => {
  const card = document.createElement("div");
  card.className = "card " + p.type;
  card.dataset.type = p.type;
  card.dataset.index = i;
  card.innerHTML =
    '<img src="' + p.card + '" alt="' + p.title + '">' +
    '<div class="text">' + p.title + '<span>' + p.titleCn + '</span></div>';
  cardsContainer.appendChild(card);
});

/* =========================
   HOME HERO BACKGROUND
========================= */
const heroImages = projects.map(p => p.hero);

let heroIndex = 0;
const bg = document.getElementById("bg");

bg.style.backgroundImage = "url(" + heroImages[0] + ")";

setInterval(() => {
  heroIndex = (heroIndex + 1) % heroImages.length;
  bg.style.opacity = 0;
  setTimeout(() => {
    bg.style.backgroundImage = "url(" + heroImages[heroIndex] + ")";
    bg.style.opacity = 1;
  }, 600);
}, 4000);

/* =========================
   HOME FILTER
========================= */
const items = document.querySelectorAll(".item");

items.forEach(item => {
  item.addEventListener("click", () => {

    const type = item.dataset.type;

    items.forEach(i => i.classList.remove("active"));
    item.classList.add("active");

    const cards = document.querySelectorAll(".card");

    cards.forEach(c => {
      if (type === "all") {
        c.style.display = "block";
      } else {
        c.style.display = c.dataset.type === type ? "block" : "none";
      }
    });

    document.getElementById("projects")
      .scrollIntoView({ behavior: "smooth" });

  });
});

/* =========================
   SPACE DATA (from projects)
========================= */
const spaces = {};

function buildSpaces() {
  projects.forEach(p => {
    if (!spaces[p.type]) {
      spaces[p.type] = {
        projects: [],
        currentIndex: 0
      };
    }
    spaces[p.type].projects.push(p);
  });
}
buildSpaces();

/* =========================
   GENERATE TOPNAV TABS
========================= */
const topnavContainer = document.getElementById("topnavContainer");
const typeLabels = { arch: "ARCH", interior: "INT" };

function renderProjectSwitcher() {
  topnavContainer.innerHTML = Object.keys(spaces).map(type => {
    const active = type === currentSpace ? " active" : "";
    const options = spaces[type].projects.map((p, index) => {
      const current = type === currentSpace && index === spaces[type].currentIndex ? " current" : "";
      return '<div class="projectOption' + current + '" data-type="' + type + '" data-index="' + index + '">' +
        p.title +
        '<span>' + p.titleCn + '</span>' +
      '</div>';
    }).join("");

    return '<div class="navGroup' + active + '" data-type="' + type + '">' +
      '<div class="tab">' + (typeLabels[type] || type.toUpperCase()) + '</div>' +
      '<div class="projectMenu">' + options + '</div>' +
    '</div>';
  }).join("");

  topnavContainer.querySelectorAll(".projectOption").forEach(option => {
    option.addEventListener("click", (e) => {
      e.stopPropagation();
      currentSpace = option.dataset.type;
      spaces[currentSpace].currentIndex = parseInt(option.dataset.index);
      slideIndex = 0;
      lastCard = document.querySelector('.card[data-index="' + spaces[currentSpace].projects[spaces[currentSpace].currentIndex].id + '"]') || lastCard;
      renderProjectSwitcher();
      loadSpace();
      setSlide(0);
      startSpace();
    });
  });

  topnavContainer.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", (e) => {
      e.stopPropagation();
      const group = tab.closest(".navGroup");
      currentSpace = group.dataset.type;
      spaces[currentSpace].currentIndex = 0;
      slideIndex = 0;
      renderProjectSwitcher();
      loadSpace();
      setSlide(0);
      startSpace();
    });
  });
}

/* =========================
   SPACE ENGINE
========================= */
let currentSpace = "arch";
let slideIndex = 0;
let spaceTimer = null;
let lastCard = null;
let currentSlides = [];
let slideCount = 0;

const slidesContainer = document.getElementById("slidesContainer");

function createSlides(count) {
  slidesContainer.innerHTML = "";
  currentSlides = [];
  slideCount = count;
  for (let i = 0; i < count; i++) {
    const s = document.createElement("div");
    s.className = "slide" + (i === 0 ? " active" : "");
    slidesContainer.appendChild(s);
    currentSlides.push(s);
  }
}

function loadSpace() {
  const s = spaces[currentSpace];
  const p = s.projects[s.currentIndex];
  const imgs = p.gallery;

  createSlides(imgs.length);

  currentSlides.forEach((sl, idx) => {
    const src = imgs[idx];
    sl.classList.remove("portrait", "landscape");

    const probe = new Image();
    probe.onload = function() {
      const isPortrait = probe.naturalHeight > probe.naturalWidth;
      if (isPortrait) {
        sl.classList.add("portrait");
        sl.style.backgroundImage = "url(" + src + "), url(" + src + ")";
      } else {
        sl.classList.add("landscape");
        sl.style.backgroundImage = "url(" + src + ")";
      }
    };
    probe.src = src;
  });

  document.getElementById("spaceTitle").innerText = p.title;
  document.getElementById("spaceDesc").innerText = p.descCn;
  document.getElementById("projectIndex").innerText = (typeLabels[p.type] || p.type.toUpperCase()) + " / " + p.titleCn;
  document.getElementById("viewProjectLink").href = "project-monograph.html?id=" + p.id;
}

function setSlide(n) {
  currentSlides.forEach(s => s.classList.remove("active"));
  currentSlides[n].classList.add("active");
}

function nextSlide() {
  slideIndex = (slideIndex + 1) % slideCount;
  setSlide(slideIndex);
}

function startSpace() {
  clearInterval(spaceTimer);
  spaceTimer = setInterval(nextSlide, 3500);
}

function stopSpace() {
  clearInterval(spaceTimer);
}

/* HOME CARD -> SPACE */
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", (e) => {
    e.stopPropagation();

    lastCard = card;
    const idx = parseInt(card.dataset.index);
    const p = projects[idx];
    currentSpace = p.type;

    const s = spaces[currentSpace];
    s.currentIndex = s.projects.indexOf(p);
    slideIndex = 0;

    openSpace();
  });
});

function openSpace() {
  document.getElementById("spacePage").style.display = "block";
  document.body.style.overflow = "hidden";

  renderProjectSwitcher();
  loadSpace();
  setSlide(0);
  startSpace();
}

/* SPACE WHEEL CONTROL */
document.getElementById("spaceStage").addEventListener("wheel", (e) => {
  e.preventDefault();

  stopSpace();

  if (e.deltaY > 0) {
    const s = spaces[currentSpace];
    if (slideIndex < slideCount - 1) {
      slideIndex++;
      setSlide(slideIndex);
    } else {
      /* move to next project in this space */
      s.currentIndex = (s.currentIndex + 1) % s.projects.length;
      slideIndex = 0;
      renderProjectSwitcher();
      loadSpace();
      setSlide(0);
    }
  } else {
    if (slideIndex > 0) {
      slideIndex--;
      setSlide(slideIndex);
    } else {
      /* move to previous project in this space */
      const s = spaces[currentSpace];
      s.currentIndex = (s.currentIndex - 1 + s.projects.length) % s.projects.length;
      slideIndex = 0;
      renderProjectSwitcher();
      loadSpace();
      setSlide(0);
      slideIndex = slideCount - 1;
      setSlide(slideIndex);
    }
  }

  setTimeout(startSpace, 120);
}, { passive: false });

/* SPACE LEFT CLICK -> HOME, RETURN TO CARD */
document.getElementById("spacePage").addEventListener("click", (e) => {
  if (e.target.closest(".topnav")) return;
  if (e.target.closest(".view-link")) return;

  closeSpace();
});

function closeSpace() {
  stopSpace();

  document.getElementById("spacePage").style.display = "none";
  document.body.style.overflow = "auto";

  if (lastCard) {
    setTimeout(() => {
      lastCard.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }, 80);
  }
}
</script>
