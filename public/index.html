<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOHN STUDIO - PROJECT SPACE SYSTEM</title>

<style>
/* =========================
   BASE
========================= */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b0d;
  color:#fff;
}

/* =========================
   HOME / 主页面
========================= */
#homePage{
  display:block;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  transform:scale(1.1);
  transition:opacity 1.2s ease, transform 4s ease;
  filter:brightness(0.78);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.75),
    rgba(11,11,13,1)
  );
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-size:72px;
  margin:0;
  font-weight:300;
  letter-spacing:-1px;
}

/* NAV */
.nav{
  margin-top:60px;
  display:flex;
  justify-content:center;
  gap:60px;
}

.item{
  cursor:pointer;
  opacity:0.45;
  transition:transform 0.25s ease, opacity 0.25s ease;
  text-align:center;
}

.item:hover{
  opacity:1;
  transform:scale(1.12);
}

.item.active{
  opacity:1;
}

.item span{
  display:block;
  font-size:12px;
  opacity:0.4;
}

/* SECTION */
.section{
  padding:120px 40px;
  max-width:1100px;
  margin:auto;
}

.title{
  font-size:12px;
  letter-spacing:3px;
  opacity:0.4;
  margin-bottom:40px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px;
}

.card{
  cursor:pointer;
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:22px;
  transition:0.4s ease;
}

.card:hover img{
  transform:scale(1.02);
}

.card .text{
  padding:12px 6px;
}

.card .text span{
  display:block;
  font-size:12px;
  opacity:0.4;
  margin-top:6px;
}

/* CONTACT */
.contact{
  padding:120px 40px;
  max-width:1000px;
  margin:auto;
  opacity:0.75;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  font-size:13px;
}

/* =========================
   SPACE / 空间页面
========================= */
#spacePage{
  display:none;
  position:fixed;
  inset:0;
  z-index:999;
  background:#000;
  overflow:hidden;
  color:#fff;
}

/* STAGE */
.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* SLIDES */
.slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0;
  transform:scale(1.05);
  transition:opacity 1.2s ease, transform 5s ease;
  filter:brightness(0.90);
}

.slide.active{
  opacity:1;
  transform:scale(1.12);
}

/* SMART IMAGE MODE
   横图：cover 全屏沉浸
   竖图：contain 完整显示 + 同图 cover 背景补满 */
.slide.portrait{
  background-size:contain, cover;
  background-position:center, center;
  background-repeat:no-repeat, no-repeat;
}

.slide.landscape{
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* OVERLAY */
.stage::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.02) 0%,
    rgba(0,0,0,0.03) 52%,
    rgba(0,0,0,0.12) 78%,
    rgba(0,0,0,0.42) 100%
  );
  pointer-events:none;
}

/* TOP PROJECT SWITCHER */
.topnav{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:40px;
  z-index:20;
}

.navGroup{
  position:relative;
  padding:0 0 18px;
}

.tab{
  font-size:12px;
  letter-spacing:2px;
  opacity:0.4;
  cursor:pointer;
  transition:0.25s;
}

.navGroup:hover .tab{
  opacity:0.8;
  transform:scale(1.08);
}

.navGroup.active .tab{
  opacity:1;
}

.projectMenu{
  position:absolute;
  top:28px;
  left:50%;
  transform:translateX(-50%) translateY(8px);
  min-width:190px;
  padding:10px 0;
  border-radius:0;
  background:transparent;
  backdrop-filter:none;
  border:none;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease, transform .25s ease;
  text-align:center;
}

.navGroup:hover .projectMenu{
  opacity:1;
  pointer-events:auto;
  transform:translateX(-50%) translateY(0);
}

.projectOption{
  display:block;
  font-size:11px;
  letter-spacing:1.4px;
  line-height:1.45;
  padding:8px 4px;
  opacity:0.48;
  cursor:pointer;
  transition:opacity .22s ease, transform .22s ease;
  white-space:nowrap;
}

.projectOption:hover{
  opacity:1;
  transform:scale(1.04);
}

.projectOption.current{
  opacity:1;
}

.projectOption span{
  display:block;
  font-size:10px;
  letter-spacing:0;
  opacity:.35;
  margin-top:2px;
}

/* META */
.meta{
  position:absolute;
  bottom:34px;
  left:34px;
  z-index:10;
  text-shadow:0 2px 12px rgba(0,0,0,0.38);
}

.space-title{
  font-size:14px;
  opacity:0.9;
}

.desc{
  font-size:12px;
  opacity:0.45;
  margin-top:6px;
}

.project-index{
  font-size:11px;
  opacity:0.35;
  margin-top:12px;
  letter-spacing:2px;
}

/* hint */
.hint{
  position:absolute;
  right:28px;
  bottom:28px;
  font-size:11px;
  opacity:0.25;
  z-index:10;
}


/* PORTRAIT ONLY SIDE BLUR GLASS
   只在竖向图片 contain 排版时开启；横幅图片保持原样 */
.sideBlur{
  position:absolute;
  top:0;
  bottom:0;
  width:min(20vw, 290px);
  z-index:6;
  pointer-events:none;
  opacity:0;
  transition:opacity .45s ease;
  backdrop-filter:blur(16px) saturate(1.02) brightness(1.03);
  -webkit-backdrop-filter:blur(16px) saturate(1.02) brightness(1.03);
}

.stage.portraitMode .sideBlur{
  opacity:1;
}

.sideBlur.left{
  left:0;
  background:
    linear-gradient(to right,
      rgba(255,255,255,0.05) 0%,
      rgba(255,255,255,0.025) 34%,
      rgba(255,255,255,0.01) 68%,
      rgba(255,255,255,0.00) 100%);
  mask-image:linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,.96) 55%, rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to right, rgba(0,0,0,1) 0%, rgba(0,0,0,.96) 55%, rgba(0,0,0,0) 100%);
}

.sideBlur.right{
  right:0;
  background:
    linear-gradient(to left,
      rgba(255,255,255,0.05) 0%,
      rgba(255,255,255,0.025) 34%,
      rgba(255,255,255,0.01) 68%,
      rgba(255,255,255,0.00) 100%);
  mask-image:linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,.96) 55%, rgba(0,0,0,0) 100%);
  -webkit-mask-image:linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,.96) 55%, rgba(0,0,0,0) 100%);
}

@media(max-width:760px){
  .sideBlur{
    width:16vw;
    backdrop-filter:blur(12px) saturate(1.02) brightness(1.03);
    -webkit-backdrop-filter:blur(12px) saturate(1.02) brightness(1.03);
  }
  h1{font-size:46px;}
  .nav{gap:26px;}
  .cards{grid-template-columns:1fr;}
  .card img{height:360px;}
  .contact{grid-template-columns:1fr;}
  .topnav{gap:26px;}
  .projectMenu{min-width:160px;}
}
</style>
</head>

<body>

<!-- =========================
     HOME / 主页面
========================= -->
<div id="homePage">

  <!-- HERO -->
  <div class="hero">
    <div class="bg" id="bg"></div>

    <div class="content">
      <h1>JOHN STUDIO</h1>

      <div class="nav">
        <div class="item active" data-type="all">ALL<span>全部</span></div>
        <div class="item" data-type="arch">ARCH<span>建筑</span></div>
        <div class="item" data-type="interior">INT<span>室内</span></div>
        <div class="item" data-type="product">PROD<span>产品</span></div>
      </div>

    </div>
  </div>

  <!-- SECTION -->
  <div class="section" id="projects">
    <div class="title">PROJECTS / 项目</div>

    <div class="cards" id="cardsContainer">
      <!-- Cards generated by JS -->
    </div>
  </div>

  <!-- CONTACT -->
  <div class="contact">
    <div>JOHN STUDIO<br>Studio</div>
    <div>971703097@qq.com<br>Instagram</div>
    <div>中国 / 广州</div>
  </div>

</div>

<!-- =========================
     SPACE / 空间页面
========================= -->
<div id="spacePage">

  <div class="stage" id="spaceStage">

    <div class="sideBlur left"></div>
    <div class="sideBlur right"></div>

    <!-- TOP NAV / 分类项目入口 -->
    <div class="topnav" id="projectSwitcher"></div>

    <!-- SLIDES -->
    <div class="slide active" id="s0"></div>
    <div class="slide" id="s1"></div>
    <div class="slide" id="s2"></div>
    <div class="slide" id="s3"></div>

    <!-- META -->
    <div class="meta">
      <div class="space-title" id="spaceTitle"></div>
      <div class="desc" id="spaceDesc"></div>
      <div class="project-index" id="projectIndex"></div>
    </div>

    <div class="hint">Scroll within project · Hover ARCH / INT / PROD to switch project · Left click blank area to return</div>

  </div>

</div>

<script>
/* =========================
   PROJECT DATA
========================= */
const projectTypes = {
  arch: "ARCH",
  interior: "INT",
  product: "PROD"
};

const projects = {
  dongguanNewWorld:{
    id:0, type:"interior",
    title:"Dongguan New World",
    cn:"东莞新世界",
    desc:"A calm interior sequence shaped by material restraint, light, and spatial rhythm.",
    card:"assets/projects/dongguan-new-world-interior/card.webp",
    imgs:[
      "assets/projects/dongguan-new-world-interior/01.webp",
      "assets/projects/dongguan-new-world-interior/02.webp",
      "assets/projects/dongguan-new-world-interior/03.webp",
      "assets/projects/dongguan-new-world-interior/04.webp"
    ]
  },
  nanjingHuaihe:{
    id:1, type:"arch",
    title:"Huaihe Wharf, Nanjing",
    cn:"南京秦双线淮河码头",
    desc:"A restrained architectural project shaped by site, movement, and public spatial sequence.",
    card:"assets/projects/nanjing-huaihe-wharf/card.webp",
    imgs:[
      "assets/projects/nanjing-huaihe-wharf/01.webp",
      "assets/projects/nanjing-huaihe-wharf/02.webp",
      "assets/projects/nanjing-huaihe-wharf/03.webp",
      "assets/projects/nanjing-huaihe-wharf/04.webp"
    ]
  },
  barInterior:{
    id:2, type:"interior",
    title:"Bar Interior",
    cn:"酒吧室内",
    desc:"A calm interior sequence shaped by material restraint, light, and spatial rhythm.",
    card:"assets/projects/bar-interior/card.webp",
    imgs:[
      "assets/projects/bar-interior/01.webp",
      "assets/projects/bar-interior/02.webp",
      "assets/projects/bar-interior/03.webp",
      "assets/projects/bar-interior/04.webp"
    ]
  },
  fujianLishui:{
    id:3, type:"arch",
    title:"Lishui Hot Spring Visitor Center",
    cn:"福建利水温泉游客中心",
    desc:"A restrained architectural project shaped by site, movement, and public spatial sequence.",
    card:"assets/projects/fujian-lishui-hot-spring-visitor-center/card.webp",
    imgs:[
      "assets/projects/fujian-lishui-hot-spring-visitor-center/01.webp",
      "assets/projects/fujian-lishui-hot-spring-visitor-center/02.webp",
      "assets/projects/fujian-lishui-hot-spring-visitor-center/hero.webp",
      "assets/projects/fujian-lishui-hot-spring-visitor-center/closing.webp"
    ]
  },
  helongSchool:{
    id:4, type:"arch",
    title:"He Long Hope Primary School",
    cn:"贺龙希望小学扩建",
    desc:"A restrained architectural project shaped by site, movement, and public spatial sequence.",
    card:"assets/projects/helong-hope-primary-school-extension/card.webp",
    imgs:[
      "assets/projects/helong-hope-primary-school-extension/01.webp",
      "assets/projects/helong-hope-primary-school-extension/02.webp",
      "assets/projects/helong-hope-primary-school-extension/03.webp",
      "assets/projects/helong-hope-primary-school-extension/hero.webp"
    ]
  },
  dongguanVanke:{
    id:5, type:"interior",
    title:"Dongguan Vanke Mountain Realm",
    cn:"东莞 · 万科山境",
    desc:"A calm interior sequence shaped by material restraint, light, and spatial rhythm.",
    card:"assets/projects/dongguan-vanke-mountain-realm/card.webp",
    imgs:[
      "assets/projects/dongguan-vanke-mountain-realm/01.webp",
      "assets/projects/dongguan-vanke-mountain-realm/02.webp",
      "assets/projects/dongguan-vanke-mountain-realm/03.webp",
      "assets/projects/dongguan-vanke-mountain-realm/04.webp"
    ]
  },
  guangzhouNansha:{
    id:6, type:"interior",
    title:"Guangzhou Nansha Yitao Peninsula",
    cn:"广州 · 南沙逸涛半岛",
    desc:"A calm interior sequence shaped by material restraint, light, and spatial rhythm.",
    card:"assets/projects/guangzhou-nansha-yitao-peninsula/card.webp",
    imgs:[
      "assets/projects/guangzhou-nansha-yitao-peninsula/01.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/02.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/03.webp",
      "assets/projects/guangzhou-nansha-yitao-peninsula/04.webp"
    ]
  },
  productConcept:{
    id:7, type:"product",
    title:"Product Concept",
    cn:"产品概念",
    desc:"Independent product concept space / 独立产品概念空间",
    card:"",
    imgs:[]
  }
};

/* =========================
   GENERATE HOME CARDS
========================= */
const cardsContainer = document.getElementById("cardsContainer");

Object.entries(projects).forEach(([key, p]) => {
  if(!p.card) return;
  const card = document.createElement("div");
  card.className = "card " + p.type;
  card.dataset.project = key;
  card.innerHTML =
    '<img src="' + p.card + '" alt="' + p.title + '">' +
    '<div class="text">' + p.title + '<span>' + p.cn + '</span></div>';
  cardsContainer.appendChild(card);
});


/* =========================
   HOME HERO BACKGROUND
========================= */
const heroImages = Object.values(projects).filter(p => p.card).map(p => p.card);

let heroIndex=0;
const bg=document.getElementById("bg");

bg.style.backgroundImage=`url(${heroImages[0]})`;

setInterval(()=>{
  heroIndex=(heroIndex+1)%heroImages.length;
  bg.style.opacity=0;
  setTimeout(()=>{
    bg.style.backgroundImage=`url(${heroImages[heroIndex]})`;
    bg.style.opacity=1;
  },600);
},4000);


/* =========================
   HOME FILTER + SCROLL
========================= */
const items=document.querySelectorAll(".item");

items.forEach(item=>{
  item.addEventListener("click",()=>{

    const type=item.dataset.type;

    items.forEach(i=>i.classList.remove("active"));
    item.classList.add("active");

    const cards=document.querySelectorAll(".card");

    cards.forEach(c=>{
      if(type==="all"){
        c.style.display="block";
      }else{
        c.style.display=c.classList.contains(type)?"block":"none";
      }
    });

    document.getElementById("projects")
      .scrollIntoView({behavior:"smooth"});

  });
});


/* =========================
   SPACE ENGINE
========================= */
let currentProject = "dongguanNewWorld";
let slideIndex = 0;
let spaceTimer = null;
let lastCard = null;

const slides = [
  document.getElementById("s0"),
  document.getElementById("s1"),
  document.getElementById("s2"),
  document.getElementById("s3")
];

function getProjectsByType(type){
  return Object.entries(projects).filter(([key,p])=>p.type===type);
}

/* 顶部 ARCH / INT / PROD 项目切换菜单 */
function renderProjectSwitcher(){
  const switcher = document.getElementById("projectSwitcher");
  const currentType = projects[currentProject].type;

  switcher.innerHTML = Object.entries(projectTypes).map(([type,label])=>{
    const list = getProjectsByType(type).map(([key,p])=>{
      const current = key === currentProject ? "current" : "";
      return `
        <div class="projectOption ${current}" data-project="${key}">
          ${p.title}
          <span>${p.cn}</span>
        </div>
      `;
    }).join("");

    const active = type === currentType ? "active" : "";

    return `
      <div class="navGroup ${active}" data-type="${type}">
        <div class="tab">${label}</div>
        <div class="projectMenu">${list}</div>
      </div>
    `;
  }).join("");

  switcher.querySelectorAll(".projectOption").forEach(option=>{
    option.addEventListener("click",(e)=>{
      e.stopPropagation();
      const key = option.dataset.project;
      switchProject(key);
    });
  });
}

function loadProject(){
  const p = projects[currentProject];

  slides.forEach((sl,idx)=>{
    const src = p.imgs[idx];

    sl.classList.remove("portrait", "landscape");
    delete sl.dataset.orientation;

    if(!src){
      sl.style.backgroundImage = "";
      return;
    }

    const probe = new Image();
    probe.onload = function(){
      const isPortrait = probe.naturalHeight > probe.naturalWidth;

      if(isPortrait){
        sl.classList.add("portrait");
        sl.dataset.orientation = "portrait";
        sl.style.backgroundImage = `url(${src}), url(${src})`;
      }else{
        sl.classList.add("landscape");
        sl.dataset.orientation = "landscape";
        sl.style.backgroundImage = `url(${src})`;
      }

      if(sl.classList.contains("active")){
        updateStageImageMode();
      }
    };

    probe.src = src;
  });

  document.getElementById("spaceTitle").innerText = p.title;
  document.getElementById("spaceDesc").innerText = p.desc;
  document.getElementById("projectIndex").innerText = `${projectTypes[p.type]} / ${p.cn}`;
}

function updateStageImageMode(){
  const stage = document.getElementById("spaceStage");
  const activeSlide = slides[slideIndex];
  const isPortrait = activeSlide && activeSlide.dataset.orientation === "portrait";
  stage.classList.toggle("portraitMode", isPortrait);
}

function setSlide(n){
  slides.forEach(s=>s.classList.remove("active"));
  slides[n].classList.add("active");
  updateStageImageMode();
}

function nextSlide(){
  const p = projects[currentProject];
  slideIndex = (slideIndex + 1) % p.imgs.length;
  setSlide(slideIndex);
}

function startSpace(){
  clearInterval(spaceTimer);
  spaceTimer = setInterval(nextSlide, 3500);
}

function stopSpace(){
  clearInterval(spaceTimer);
}

function switchProject(key){
  if(!projects[key]) return;

  currentProject = key;
  slideIndex = 0;

  const matchingCard = document.querySelector(`.card[data-project="${key}"]`);
  if(matchingCard) lastCard = matchingCard;

  renderProjectSwitcher();
  loadProject();
  setSlide(0);
  startSpace();
}

/* HOME CARD -> PROJECT SPACE */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click",(e)=>{
    e.stopPropagation();

    lastCard = card;
    currentProject = card.dataset.project || "dongguanNewWorld";
    slideIndex = 0;

    openSpace();
  });
});

function openSpace(){
  document.getElementById("spacePage").style.display="block";
  document.body.style.overflow="hidden";

  renderProjectSwitcher();
  loadProject();
  setSlide(0);
  startSpace();
}

/* SPACE WHEEL CONTROL
   滚轮只浏览当前项目内部图片，不跳到其它项目 */
document.getElementById("spaceStage").addEventListener("wheel",(e)=>{
  e.preventDefault();

  stopSpace();

  if(e.deltaY > 0){
    nextSlide();
  }else{
    const p = projects[currentProject];
    slideIndex = (slideIndex - 1 + p.imgs.length) % p.imgs.length;
    setSlide(slideIndex);
  }

  setTimeout(startSpace,120);
},{passive:false});


/* SPACE LEFT CLICK -> HOME, RETURN TO CURRENT PROJECT CARD */
document.getElementById("spacePage").addEventListener("click",(e)=>{
  if(e.target.closest(".topnav")) return;

  closeSpace();
});

function closeSpace(){
  stopSpace();

  document.getElementById("spacePage").style.display="none";
  document.body.style.overflow="auto";

  if(lastCard){
    setTimeout(()=>{
      lastCard.scrollIntoView({
        behavior:"smooth",
        block:"center"
      });
    },80);
  }
}
</script>

</body>
</html>
